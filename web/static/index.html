<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Deagz Intelligence</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Deagz Intelligence">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <canvas id="orb-canvas" onclick="toggleMic()" style="cursor: pointer;"></canvas>

  <!-- Status bar -->
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Online</span>
  </div>

  <!-- Name badge -->
  <div id="name-badge">DEAGZ</div>

  <!-- Dashboard HUD panels -->
  <div id="dashboard">
    <div class="hud-panel" id="hud-time">
      <div class="hud-label">TIME</div>
      <div class="hud-value" id="hud-clock">--:-- --</div>
      <div class="hud-sub" id="hud-date">---</div>
    </div>
    <div class="hud-panel" id="hud-weather">
      <div class="hud-label">WEATHER</div>
      <div class="hud-value" id="hud-temp">--°F</div>
      <div class="hud-sub" id="hud-condition">---</div>
    </div>
    <div class="hud-panel" id="hud-portfolio">
      <div class="hud-label">TOTAL VALUE</div>
      <div class="hud-value" id="hud-balance">$--.--</div>
      <div class="hud-sub" id="hud-pnl">Cash: --- | P&L: ---</div>
    </div>
    <div class="hud-panel" id="hud-bot">
      <div class="hud-label">BOT STATUS</div>
      <div class="hud-value" id="hud-bot-status">---</div>
      <div class="hud-sub" id="hud-bot-detail">---</div>
    </div>
  </div>

  <!-- Transcript -->
  <div id="transcript">
    <div id="transcript-user"></div>
    <div id="transcript-jarvis"></div>
  </div>

  <!-- State label -->
  <div id="state-label"></div>

  <!-- Camera button -->
  <div id="camera-btn" onclick="openCamera()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
  </div>

  <!-- Camera overlay -->
  <div id="camera-overlay" style="display:none;">
    <video id="camera-video" autoplay playsinline></video>
    <div id="camera-controls">
      <button id="camera-snap" onclick="snapPhoto()">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="white">
          <circle cx="12" cy="12" r="10"/>
        </svg>
      </button>
      <button id="camera-close" onclick="closeCamera()">✕</button>
    </div>
    <input id="camera-question" type="text" placeholder="Ask about what you see... (optional)" />
  </div>
  <canvas id="snap-canvas" style="display:none;"></canvas>

  <!-- Activate button — arc reactor style -->
  <div id="mic-btn" onclick="toggleMic()">
    <canvas id="mic-canvas" width="70" height="70"></canvas>
  </div>

  <script src="/static/orb.js"></script>
  <script>
    const orb = new JarvisOrb(document.getElementById("orb-canvas"));
    const stateLabel = document.getElementById("state-label");
    const statusText = document.getElementById("status-text");
    const statusDot = document.getElementById("status-dot");
    const transcriptJarvis = document.getElementById("transcript-jarvis");
    const transcriptUser = document.getElementById("transcript-user");
    const micBtn = document.getElementById("mic-btn");

    let isBusy = false;
    let isListening = false;
    let currentAudio = null;
    let recognition = null;
    let audioContext = null;
    let analyser = null;

    // Create AudioContext on first user interaction — this is the ONLY reliable way
    // to unlock audio in Chrome. Once created from a click, it stays unlocked forever.
    function ensureAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        console.log("AudioContext created, state:", audioContext.state);
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
      return audioContext;
    }
    document.addEventListener("click", ensureAudioContext);
    document.addEventListener("touchstart", ensureAudioContext);
    let animFrameId = null;

    // Setup Web Speech API — always-on, no wake word needed
    // Sends automatically when you stop talking
    if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.continuous = false;  // Stop after silence — auto-sends
      recognition.interimResults = true;
      recognition.lang = "en-US";

      let lastInterim = "";

      recognition.onresult = (event) => {
        let transcript = "";
        let isFinal = false;
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
          if (event.results[i].isFinal) isFinal = true;
        }

        lastInterim = transcript;

        if (isFinal && !isBusy) {
          let command = transcript.trim();
          // Strip "Jarvis" from the start if they say it
          const lower = command.toLowerCase();
          if (lower.startsWith("jarvis")) {
            command = command.substring(6).replace(/^[,.\s]+/, "").trim();
          }
          // Fix common misheard words
          command = command.replace(/call she/gi, "Kalshi");
          command = command.replace(/kalshie/gi, "Kalshi");
          command = command.replace(/kalshy/gi, "Kalshi");
          command = command.replace(/colshy/gi, "Kalshi");
          command = command.replace(/col she/gi, "Kalshi");
          command = command.replace(/cal she/gi, "Kalshi");
          command = command.replace(/calshe/gi, "Kalshi");
          command = command.replace(/cautious/gi, "Kalshi");
          command = command.replace(/kulshi/gi, "Kalshi");
          command = command.replace(/kashi/gi, "Kalshi");
          command = command.replace(/Deegz/gi, "Deagz");
          command = command.replace(/digs/gi, "Deagz");
          if (command.length > 1) {
            sendMessage(command);
          }
        }
      };

      recognition.onerror = (e) => {
        console.error("Speech error:", e.error);
        if (e.error !== "not-allowed" && e.error !== "service-not-allowed") {
          setTimeout(() => startAlwaysListening(), 1000);
        }
      };

      recognition.onend = () => {
        // Don't auto-restart — wait for click or Jarvis asking a question
        isListening = false;
        if (!isBusy) {
          orb.setState("idle");
          stateLabel.textContent = "";
          statusText.textContent = "Online";
        }
      };
    }

    function startAlwaysListening() {
      if (isBusy || isListening) return;
      try {
        recognition.start();
        isListening = true;
        stateLabel.textContent = "SPEAK NOW";
        stateLabel.style.color = "rgba(0, 255, 255, 0.8)";
        statusText.textContent = "Listening";
        orb.setState("listening");
        hideDashboard();
      } catch (e) {
        // Already started
      }
    }

    function stopListening() {
      isListening = false;
      try { recognition.stop(); } catch (e) {}
    }

    // Mic button — manual push to talk (skips wake word)
    let directMode = false;

    function toggleMic() {
      if (isBusy) return;

      if (directMode) {
        // Already in direct mode — do nothing, let it finish
        return;
      }

      directMode = true;
      stopListening();

      // Small delay to let the always-on recognizer fully stop
      setTimeout(() => {
        orb.setState("listening");
        statusText.textContent = "LISTENING";
        statusDot.style.background = "#00ffff";
        statusDot.style.boxShadow = "0 0 16px #00ffff";
        document.getElementById("state-label").textContent = "SPEAK NOW";
        document.getElementById("state-label").style.color = "rgba(0, 255, 255, 0.8)";
        transcriptJarvis.classList.remove("visible");

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const directRec = new SpeechRecognition();
        directRec.continuous = false;
        directRec.interimResults = false;
        directRec.lang = "en-US";

        directRec.onresult = (event) => {
          let transcript = event.results[0][0].transcript;
          // Strip wake word if included
          const lower = transcript.toLowerCase();
          if (lower.startsWith("jarvis")) {
            transcript = transcript.substring(6).replace(/^[,.\s]+/, "").trim();
          }
          if (transcript) sendMessage(transcript);
        };

        directRec.onerror = () => {
          directMode = false;
          startAlwaysListening();
        };

        directRec.onend = () => {
          directMode = false;
          if (!isBusy) startAlwaysListening();
        };

        try {
          directRec.start();
        } catch (e) {
          directMode = false;
          startAlwaysListening();
        }
      }, 300);
    }

    async function sendMessage(text) {
      if (!text.trim() || isBusy) return;
      isBusy = true;
      stopListening();

      // Stop any playing audio
      if (currentAudio) {
        try { currentAudio.stop(); } catch(e) {}
        currentAudio = null;
        cancelAnimationFrame(animFrameId);
        orb.setAudioLevel(0);
      }

      orb.setState("thinking");
      stateLabel.textContent = "";
      statusText.textContent = "Processing";

      try {
        // Use SSE stream — text arrives first, then audio
        const resp = await fetch("/api/chat-stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let jarvisText = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop(); // keep incomplete line

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            try {
              const msg = JSON.parse(line.slice(6));

              if (msg.type === "text") {
                // Text arrives FIRST — show immediately
                jarvisText = msg.content;
                transcriptJarvis.textContent = jarvisText;
                transcriptJarvis.classList.add("visible");
                statusText.textContent = "Generating voice...";
              }

              if (msg.type === "audio") {
                // Audio arrives — play it
                orb.setState("speaking");
                statusText.textContent = "Speaking";
                const raw = atob(msg.content);
                const arr = new Uint8Array(raw.length);
                for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
                const blob = new Blob([arr], { type: "audio/mpeg" });
                await playAudioWithOrb(blob);
              }

              if (msg.type === "done") {
                break;
              }
            } catch (e) { /* skip bad JSON */ }
          }
        }

        // Done speaking
        orb.setState("idle");
        statusDot.style.background = "#00ff88";
        statusDot.style.boxShadow = "0 0 8px #00ff88";
        statusText.textContent = "Online";
        stateLabel.textContent = "";
        isBusy = false;
        setTimeout(showDashboard, 2000);
        refreshDashboard();

        // If Jarvis asked a question, auto-listen for the answer
        if (jarvisText && jarvisText.includes("?")) {
          setTimeout(() => startAlwaysListening(), 500);
        }

      } catch (err) {
        console.error("Error:", err);
        orb.setState("idle");
        stateLabel.textContent = "";
        statusText.textContent = "Error";
        isBusy = false;
        setTimeout(() => startAlwaysListening(), 2000);
      }
    }

    function playAudioWithOrb(blob) {
      return new Promise(async (resolve) => {
        try {
          const ctx = ensureAudioContext();
          const arrayBuf = await blob.arrayBuffer();
          const audioBuf = await ctx.decodeAudioData(arrayBuf);

          const source = ctx.createBufferSource();
          source.buffer = audioBuf;
          source.connect(ctx.destination);
          currentAudio = source;

          // Pulse orb while playing
          orb.setAudioLevel(0.5);
          function pulse() {
            if (currentAudio === source) {
              const level = 0.3 + Math.random() * 0.4;
              orb.setAudioLevel(level);
              animFrameId = requestAnimationFrame(pulse);
            }
          }
          pulse();

          source.onended = () => {
            cancelAnimationFrame(animFrameId);
            orb.setAudioLevel(0);
            currentAudio = null;
            resolve();
          };

          source.start(0);
        } catch (e) {
          console.error("Audio playback error:", e);
          orb.setAudioLevel(0);
          currentAudio = null;
          resolve();
        }
      });
    }

    // Spacebar as push-to-talk shortcut
    document.addEventListener("keydown", (e) => {
      if (e.code === "Space" && !e.repeat && !isBusy) {
        e.preventDefault();
        toggleMic();
      }
    });

    // Only start listening on orb click — not auto

    // Mini arc reactor button animation
    const micCanvas = document.getElementById("mic-canvas");
    const mctx = micCanvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    micCanvas.width = 70 * dpr;
    micCanvas.height = 70 * dpr;
    mctx.scale(dpr, dpr);
    let btnTime = 0;

    function drawMicButton() {
      btnTime += 0.02;
      mctx.clearRect(0, 0, 70, 70);
      const cx = 35, cy = 35;

      const isActive = isBusy || isListening;
      const baseColor = isActive ? "0, 200, 255" : "0, 150, 220";
      const glow = isActive ? 0.4 : 0.2;

      // Outer glow
      const g = mctx.createRadialGradient(cx, cy, 10, cx, cy, 35);
      g.addColorStop(0, `rgba(${baseColor}, ${glow})`);
      g.addColorStop(1, "rgba(0,0,0,0)");
      mctx.fillStyle = g;
      mctx.beginPath();
      mctx.arc(cx, cy, 35, 0, Math.PI * 2);
      mctx.fill();

      // Outer ring
      mctx.beginPath();
      mctx.arc(cx, cy, 28, 0, Math.PI * 2);
      mctx.strokeStyle = `rgba(${baseColor}, 0.4)`;
      mctx.lineWidth = 1.5;
      mctx.stroke();

      // Segmented rotating ring
      mctx.save();
      mctx.translate(cx, cy);
      mctx.rotate(btnTime);
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        mctx.beginPath();
        mctx.arc(0, 0, 23, a + 0.1, a + (Math.PI / 4) - 0.1);
        mctx.strokeStyle = `rgba(${baseColor}, ${i % 2 === 0 ? 0.5 : 0.2})`;
        mctx.lineWidth = 2;
        mctx.stroke();
      }
      mctx.restore();

      // Center core
      const pulse = Math.sin(btnTime * 2) * 0.1;
      const coreG = mctx.createRadialGradient(cx, cy, 0, cx, cy, 12);
      coreG.addColorStop(0, `rgba(200, 240, 255, ${0.8 + pulse})`);
      coreG.addColorStop(0.5, `rgba(0, 180, 255, ${0.4 + pulse})`);
      coreG.addColorStop(1, `rgba(0, 100, 200, 0)`);
      mctx.fillStyle = coreG;
      mctx.beginPath();
      mctx.arc(cx, cy, 12, 0, Math.PI * 2);
      mctx.fill();

      // Inner triangle
      mctx.save();
      mctx.translate(cx, cy);
      mctx.rotate(-btnTime * 0.5);
      mctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
        mctx[i === 0 ? "moveTo" : "lineTo"](Math.cos(a) * 7, Math.sin(a) * 7);
      }
      mctx.closePath();
      mctx.strokeStyle = `rgba(180, 230, 255, 0.6)`;
      mctx.lineWidth = 1;
      mctx.stroke();
      mctx.restore();

      requestAnimationFrame(drawMicButton);
    }
    drawMicButton();

    // Ensure audio context is unlocked on first click
    document.addEventListener("click", () => {
      if (audioContext && audioContext.state === "suspended") {
        audioContext.resume();
      }
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    }, { once: false });

    // No auto-start — click orb or press space to talk

    // === DASHBOARD ===
    const dashboard = document.getElementById("dashboard");

    // Update clock every second
    function updateClock() {
      const now = new Date();
      const hours = now.getHours() % 12 || 12;
      const mins = now.getMinutes().toString().padStart(2, "0");
      const ampm = now.getHours() >= 12 ? "PM" : "AM";
      document.getElementById("hud-clock").textContent = `${hours}:${mins} ${ampm}`;

      const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      document.getElementById("hud-date").textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Fetch dashboard data
    async function refreshDashboard() {
      try {
        const resp = await fetch("/api/dashboard");
        const d = await resp.json();

        // Weather
        if (d.weather && d.weather.summary) {
          const match = d.weather.summary.match(/([\d.]+)F/);
          if (match) {
            document.getElementById("hud-temp").textContent = `${Math.round(parseFloat(match[1]))}°F`;
          }
          const condMatch = d.weather.summary.match(/\d+F,\s*(.+?),\s*wind/);
          if (condMatch) {
            document.getElementById("hud-condition").textContent = condMatch[1];
          }
        }

        // Portfolio
        if (d.portfolio) {
          const total = (d.portfolio.balance || 0) + (d.portfolio.portfolio_value || 0);
          document.getElementById("hud-balance").textContent = `$${total.toFixed(2)}`;
          const pnl = d.portfolio.pnl || 0;
          const pnlEl = document.getElementById("hud-pnl");
          pnlEl.textContent = `Cash: $${(d.portfolio.balance || 0).toFixed(2)} | P&L: ${pnl >= 0 ? "+" : ""}$${pnl.toFixed(2)}`;
          pnlEl.style.color = pnl >= 0 ? "rgba(0, 255, 150, 0.7)" : "rgba(255, 80, 80, 0.7)";
        }

        // Bot
        if (d.bot) {
          const statusEl = document.getElementById("hud-bot-status");
          statusEl.textContent = d.bot.running ? "ACTIVE" : "STOPPED";
          statusEl.style.color = d.bot.running ? "rgba(0, 255, 150, 0.9)" : "rgba(255, 80, 80, 0.9)";
          document.getElementById("hud-bot-detail").textContent = `${d.bot.scans || 0} scans | ${d.bot.trades || 0} trades`;
        }
      } catch (e) {
        console.log("Dashboard fetch error:", e);
      }
    }

    // Initial load + refresh every 30s
    refreshDashboard();
    setInterval(refreshDashboard, 30000);

    // Hide dashboard when talking, show when idle
    function hideDashboard() { dashboard.classList.add("hidden"); }
    function showDashboard() { dashboard.classList.remove("hidden"); }

    // ---- Camera Vision ----
    let cameraStream = null;

    function openCamera() {
      const overlay = document.getElementById("camera-overlay");
      const video = document.getElementById("camera-video");
      overlay.style.display = "flex";

      navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      }).then(stream => {
        cameraStream = stream;
        video.srcObject = stream;
      }).catch(err => {
        console.error("Camera error:", err);
        alert("Could not access camera. Check permissions.");
        closeCamera();
      });
    }

    function closeCamera() {
      const overlay = document.getElementById("camera-overlay");
      overlay.style.display = "none";
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }
    }

    async function snapPhoto() {
      const video = document.getElementById("camera-video");
      const canvas = document.getElementById("snap-canvas");
      const question = document.getElementById("camera-question").value.trim();

      // Capture frame
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);
      const imageData = canvas.toDataURL("image/jpeg", 0.8);

      // Close camera
      closeCamera();

      // Show thinking state
      isBusy = true;
      orb.setState("thinking");
      statusText.textContent = "Analyzing image...";
      stateLabel.textContent = "";

      try {
        const resp = await fetch("/api/vision", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            image: imageData,
            question: question || "What is this? Describe it briefly as JARVIS would — 2-3 sentences max.",
          }),
        });

        const jarvisText = decodeURIComponent(resp.headers.get("X-Jarvis-Text") || "");
        if (jarvisText) {
          transcriptJarvis.textContent = jarvisText;
          transcriptJarvis.classList.add("visible");
        }

        orb.setState("speaking");
        statusText.textContent = "Speaking";

        const audioBlob = await resp.blob();
        await playAudioWithOrb(audioBlob);

        orb.setState("idle");
        statusText.textContent = "Online";
        isBusy = false;
        setTimeout(showDashboard, 2000);
      } catch (err) {
        console.error("Vision error:", err);
        orb.setState("idle");
        statusText.textContent = "Error";
        isBusy = false;
      }
    }
  </script>
</body>
</html>
