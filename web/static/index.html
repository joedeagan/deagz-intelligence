<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Deagz Intelligence</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JARVIS">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <canvas id="orb-canvas" onclick="toggleMic()" style="cursor: pointer;"></canvas>

  <!-- Status bar -->
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Online</span>
  </div>

  <!-- Name badge -->
  <div id="name-badge">DEAGZ</div>

  <!-- Dashboard HUD panels -->
  <div id="dashboard">
    <div class="hud-panel" id="hud-time">
      <div class="hud-label">TIME</div>
      <div class="hud-value" id="hud-clock">--:-- --</div>
      <div class="hud-sub" id="hud-date">---</div>
    </div>
    <div class="hud-panel" id="hud-weather">
      <div class="hud-label">WEATHER</div>
      <div class="hud-value" id="hud-temp">--°F</div>
      <div class="hud-sub" id="hud-condition">---</div>
    </div>
    <div class="hud-panel" id="hud-portfolio">
      <div class="hud-label">TOTAL VALUE</div>
      <div class="hud-value" id="hud-balance">$--.--</div>
      <div class="hud-sub" id="hud-pnl">Cash: --- | P&L: ---</div>
    </div>
    <div class="hud-panel" id="hud-bot">
      <div class="hud-label">BOT STATUS</div>
      <div class="hud-value" id="hud-bot-status">---</div>
      <div class="hud-sub" id="hud-bot-detail">---</div>
    </div>
  </div>

  <!-- Transcript (current) -->
  <div id="transcript">
    <div id="transcript-user"></div>
    <div id="transcript-jarvis"></div>
  </div>

  <!-- Chat history panel -->
  <div id="history-toggle" onclick="toggleHistory()">▲ History</div>
  <div id="history-panel" style="display:none;">
    <div id="history-header">
      <span>CONVERSATION LOG</span>
      <span id="history-close" onclick="toggleHistory()">✕</span>
    </div>
    <div id="history-list">
      <div class="history-item history-jarvis"><span class="history-time">--</span> <span class="history-role">JARVIS</span>: No messages yet. Start talking to see your conversation here.</div>
    </div>
  </div>

  <!-- State label -->
  <div id="state-label"></div>

  <!-- Camera button -->
  <div id="camera-btn" onclick="openCamera()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
  </div>

  <!-- Camera overlay -->
  <div id="camera-overlay" style="display:none;">
    <video id="camera-video" autoplay playsinline></video>
    <div id="camera-controls">
      <button id="camera-snap" onclick="snapPhoto()">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="white">
          <circle cx="12" cy="12" r="10"/>
        </svg>
      </button>
      <button id="camera-close" onclick="closeCamera()">✕</button>
    </div>
    <input id="camera-question" type="text" placeholder="Ask about what you see... (optional)" />
  </div>
  <canvas id="snap-canvas" style="display:none;"></canvas>

  <!-- Quick actions bar (Ctrl+J) -->
  <div id="quick-bar" style="display:none;">
    <input id="quick-input" type="text" placeholder="Ask JARVIS anything..." onkeydown="quickSubmit(event)" autocomplete="off" />
  </div>

  <!-- Activate button — arc reactor style -->
  <div id="mic-btn" onclick="toggleMic()">
    <canvas id="mic-canvas" width="70" height="70"></canvas>
  </div>

  <script src="/static/orb.js"></script>
  <script>
    const orb = new JarvisOrb(document.getElementById("orb-canvas"));
    const stateLabel = document.getElementById("state-label");
    const statusText = document.getElementById("status-text");
    const statusDot = document.getElementById("status-dot");
    const transcriptJarvis = document.getElementById("transcript-jarvis");
    const transcriptUser = document.getElementById("transcript-user");
    const micBtn = document.getElementById("mic-btn");

    let isBusy = false;
    let isListening = false;
    let currentAudio = null;
    let recognition = null;
    let audioContext = null;
    let analyser = null;

    // Create AudioContext on first user interaction — this is the ONLY reliable way
    // to unlock audio in Chrome. Once created from a click, it stays unlocked forever.
    function ensureAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        console.log("AudioContext created, state:", audioContext.state);
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
      return audioContext;
    }
    document.addEventListener("click", ensureAudioContext);
    document.addEventListener("touchstart", ensureAudioContext);
    let animFrameId = null;

    // Setup Web Speech API — simple and reliable
    let wakeWordListening = false;

    function fixCommand(command) {
      command = command.replace(/call she/gi, "Kalshi");
      command = command.replace(/kalshie/gi, "Kalshi");
      command = command.replace(/kalshy/gi, "Kalshi");
      command = command.replace(/colshy/gi, "Kalshi");
      command = command.replace(/col she/gi, "Kalshi");
      command = command.replace(/cal she/gi, "Kalshi");
      command = command.replace(/calshe/gi, "Kalshi");
      command = command.replace(/cautious/gi, "Kalshi");
      command = command.replace(/kulshi/gi, "Kalshi");
      command = command.replace(/kashi/gi, "Kalshi");
      command = command.replace(/Deegz/gi, "Deagz");
      command = command.replace(/digs/gi, "Deagz");
      return command;
    }

    // No always-on recognition — it conflicts with direct mode
    // Use click/spacebar for reliable voice input

    function startAlwaysListening() {
      // No-op — wake word disabled for reliability
      // Click orb or press spacebar to talk
    }

    function stopListening() {
      isListening = false;
      try { recognition.stop(); } catch (e) {}
    }

    // Mic button — click orb or press spacebar to talk
    let directMode = false;
    let directRec = null;

    function toggleMic() {
      // If audio is playing, skip it
      if (currentAudio) {
        try { currentAudio.stop(); } catch(e) {}
        currentAudio = null;
        cancelAnimationFrame(animFrameId);
        orb.setAudioLevel(0);
        orb.setState("idle");
        statusText.textContent = "Online";
        stateLabel.textContent = "";
        isBusy = false;
        return;
      }

      if (isBusy) return;

      // If already listening, CANCEL it
      if (directMode) {
        directMode = false;
        if (directRec) {
          try { directRec.stop(); } catch(e) {}
          directRec = null;
        }
        orb.setState("idle");
        statusText.textContent = "Online";
        stateLabel.textContent = "";
        return;
      }

      directMode = true;

      // Start listening immediately
      orb.setState("listening");
      statusText.textContent = "LISTENING";
      statusDot.style.background = "#00ffff";
      statusDot.style.boxShadow = "0 0 16px #00ffff";
      stateLabel.textContent = "SPEAK NOW";
      stateLabel.style.color = "rgba(0, 255, 255, 0.8)";
      transcriptJarvis.classList.remove("visible");
      hideDashboard();

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      directRec = new SpeechRecognition();
      directRec.continuous = false;
      directRec.interimResults = false;
      directRec.lang = "en-US";

      directRec.onresult = (event) => {
        let transcript = event.results[0][0].transcript;
        const lower = transcript.toLowerCase();
        if (lower.startsWith("jarvis")) {
          transcript = transcript.substring(6).replace(/^[,.\s]+/, "").trim();
        }
        transcript = fixCommand(transcript);
        if (transcript) sendMessage(transcript);
      };

      directRec.onerror = (e) => {
        console.error("Speech error:", e.error);
        directMode = false;
        directRec = null;
        orb.setState("idle");
        statusText.textContent = "Online";
        stateLabel.textContent = "";
      };

      directRec.onend = () => {
        directMode = false;
        directRec = null;
        if (!isBusy) {
          orb.setState("idle");
          statusText.textContent = "Online";
          stateLabel.textContent = "";
          setTimeout(showDashboard, 2000);
        }
      };

      try {
        directRec.start();
      } catch (e) {
        directMode = false;
        directRec = null;
        orb.setState("idle");
        stateLabel.textContent = "";
      }
    }

    async function sendMessage(text) {
      if (!text.trim() || isBusy) return;
      isBusy = true;
      stopListening();

      // Stop any playing audio
      if (currentAudio) {
        try { currentAudio.stop(); } catch(e) {}
        currentAudio = null;
        cancelAnimationFrame(animFrameId);
        orb.setAudioLevel(0);
      }

      orb.setState("thinking");
      stateLabel.textContent = "";
      statusText.textContent = "Processing";
      addToHistory("user", text);

      try {
        // Use SSE stream — text arrives first, then audio
        const resp = await fetch("/api/chat-stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let jarvisText = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop(); // keep incomplete line

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            try {
              const msg = JSON.parse(line.slice(6));

              if (msg.type === "text") {
                // Text arrives FIRST — show immediately
                jarvisText = msg.content;
                transcriptJarvis.textContent = jarvisText;
                transcriptJarvis.classList.add("visible");
                statusText.textContent = "Generating voice...";
                addToHistory("jarvis", jarvisText);
              }

              if (msg.type === "audio") {
                // Audio arrives — play it
                orb.setState("speaking");
                statusText.textContent = "Speaking";
                const raw = atob(msg.content);
                const arr = new Uint8Array(raw.length);
                for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
                const blob = new Blob([arr], { type: "audio/mpeg" });
                await playAudioWithOrb(blob);
              }

              if (msg.type === "done") {
                break;
              }
            } catch (e) { /* skip bad JSON */ }
          }
        }

        // Done speaking
        orb.setState("idle");
        statusDot.style.background = "#00ff88";
        statusDot.style.boxShadow = "0 0 8px #00ff88";
        statusText.textContent = "Online";
        stateLabel.textContent = "";
        isBusy = false;
        setTimeout(showDashboard, 2000);
        refreshDashboard();

        // If Jarvis asked a question, auto-listen for the answer
        if (jarvisText && jarvisText.includes("?")) {
          setTimeout(() => toggleMic(), 500);
        }

      } catch (err) {
        console.error("Error:", err);
        orb.setState("idle");
        stateLabel.textContent = "";
        statusText.textContent = "Error";
        isBusy = false;
        setTimeout(() => startAlwaysListening(), 2000);
      }
    }

    function playAudioWithOrb(blob) {
      return new Promise(async (resolve) => {
        try {
          const ctx = ensureAudioContext();
          const arrayBuf = await blob.arrayBuffer();
          const audioBuf = await ctx.decodeAudioData(arrayBuf);

          const source = ctx.createBufferSource();
          source.buffer = audioBuf;
          source.connect(ctx.destination);
          currentAudio = source;

          // Pulse orb while playing
          orb.setAudioLevel(0.5);
          function pulse() {
            if (currentAudio === source) {
              const level = 0.3 + Math.random() * 0.4;
              orb.setAudioLevel(level);
              animFrameId = requestAnimationFrame(pulse);
            }
          }
          pulse();

          source.onended = () => {
            cancelAnimationFrame(animFrameId);
            orb.setAudioLevel(0);
            currentAudio = null;
            resolve();
          };

          source.start(0);
        } catch (e) {
          console.error("Audio playback error:", e);
          orb.setAudioLevel(0);
          currentAudio = null;
          resolve();
        }
      });
    }

    // Spacebar as push-to-talk shortcut
    document.addEventListener("keydown", (e) => {
      if (e.code === "Space" && !e.repeat && !isBusy) {
        e.preventDefault();
        toggleMic();
      }
      // Ctrl+J — quick actions bar (type a command)
      if ((e.ctrlKey || e.metaKey) && e.key === "j") {
        e.preventDefault();
        toggleQuickBar();
      }
      // Escape — close quick bar
      if (e.key === "Escape") {
        const qb = document.getElementById("quick-bar");
        if (qb.style.display !== "none") {
          qb.style.display = "none";
        }
      }
    });

    // Quick actions bar
    function toggleQuickBar() {
      const qb = document.getElementById("quick-bar");
      const input = document.getElementById("quick-input");
      if (qb.style.display === "none") {
        qb.style.display = "flex";
        input.value = "";
        input.focus();
      } else {
        qb.style.display = "none";
      }
    }

    function quickSubmit(e) {
      if (e.key === "Enter") {
        const input = document.getElementById("quick-input");
        const text = input.value.trim();
        if (text) {
          document.getElementById("quick-bar").style.display = "none";
          sendMessage(text);
        }
      }
    }

    // Only start listening on orb click — not auto

    // Mini arc reactor button animation
    const micCanvas = document.getElementById("mic-canvas");
    const mctx = micCanvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    micCanvas.width = 70 * dpr;
    micCanvas.height = 70 * dpr;
    mctx.scale(dpr, dpr);
    let btnTime = 0;

    function drawMicButton() {
      btnTime += 0.02;
      mctx.clearRect(0, 0, 70, 70);
      const cx = 35, cy = 35;

      const isActive = isBusy || isListening;
      const baseColor = isActive ? "0, 200, 255" : "0, 150, 220";
      const glow = isActive ? 0.4 : 0.2;

      // Outer glow
      const g = mctx.createRadialGradient(cx, cy, 10, cx, cy, 35);
      g.addColorStop(0, `rgba(${baseColor}, ${glow})`);
      g.addColorStop(1, "rgba(0,0,0,0)");
      mctx.fillStyle = g;
      mctx.beginPath();
      mctx.arc(cx, cy, 35, 0, Math.PI * 2);
      mctx.fill();

      // Outer ring
      mctx.beginPath();
      mctx.arc(cx, cy, 28, 0, Math.PI * 2);
      mctx.strokeStyle = `rgba(${baseColor}, 0.4)`;
      mctx.lineWidth = 1.5;
      mctx.stroke();

      // Segmented rotating ring
      mctx.save();
      mctx.translate(cx, cy);
      mctx.rotate(btnTime);
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        mctx.beginPath();
        mctx.arc(0, 0, 23, a + 0.1, a + (Math.PI / 4) - 0.1);
        mctx.strokeStyle = `rgba(${baseColor}, ${i % 2 === 0 ? 0.5 : 0.2})`;
        mctx.lineWidth = 2;
        mctx.stroke();
      }
      mctx.restore();

      // Center core
      const pulse = Math.sin(btnTime * 2) * 0.1;
      const coreG = mctx.createRadialGradient(cx, cy, 0, cx, cy, 12);
      coreG.addColorStop(0, `rgba(200, 240, 255, ${0.8 + pulse})`);
      coreG.addColorStop(0.5, `rgba(0, 180, 255, ${0.4 + pulse})`);
      coreG.addColorStop(1, `rgba(0, 100, 200, 0)`);
      mctx.fillStyle = coreG;
      mctx.beginPath();
      mctx.arc(cx, cy, 12, 0, Math.PI * 2);
      mctx.fill();

      // Inner triangle
      mctx.save();
      mctx.translate(cx, cy);
      mctx.rotate(-btnTime * 0.5);
      mctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
        mctx[i === 0 ? "moveTo" : "lineTo"](Math.cos(a) * 7, Math.sin(a) * 7);
      }
      mctx.closePath();
      mctx.strokeStyle = `rgba(180, 230, 255, 0.6)`;
      mctx.lineWidth = 1;
      mctx.stroke();
      mctx.restore();

      requestAnimationFrame(drawMicButton);
    }
    drawMicButton();

    // Ensure audio context is unlocked on first click
    document.addEventListener("click", () => {
      if (audioContext && audioContext.state === "suspended") {
        audioContext.resume();
      }
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    }, { once: false });

    // === STARTUP SOUND + BRIEFING ===
    let hasBooted = false;
    async function jarvisBoot() {
      if (hasBooted) return;
      hasBooted = true;
      ensureAudioContext();

      // Play startup sound
      try {
        const startupResp = await fetch("/static/jarvis_startup.mp3");
        const startupBuf = await startupResp.arrayBuffer();
        const ctx = ensureAudioContext();
        const decoded = await ctx.decodeAudioData(startupBuf);
        const src = ctx.createBufferSource();
        src.buffer = decoded;
        src.connect(ctx.destination);
        src.start(0);

        // After startup sound, fetch and play morning briefing
        src.onended = async () => {
          try {
            const briefResp = await fetch("/api/briefing");
            const briefData = await briefResp.json();
            if (briefData.text) {
              transcriptJarvis.textContent = briefData.text;
              transcriptJarvis.classList.add("visible");
              addToHistory("jarvis", briefData.text);
            }
            if (briefData.audio) {
              orb.setState("speaking");
              statusText.textContent = "Speaking";
              const raw = atob(briefData.audio);
              const arr = new Uint8Array(raw.length);
              for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
              const blob = new Blob([arr], { type: "audio/mpeg" });
              await playAudioWithOrb(blob);
              orb.setState("idle");
              statusText.textContent = "Online";
            }
          } catch (e) {
            console.log("Briefing skipped:", e);
          }
        };
      } catch (e) {
        console.log("Startup sound not found, skipping:", e);
      }
    }

    // Startup disabled — just unlock audio on first click
    // To re-enable: uncomment the jarvisBoot() calls below
    // document.addEventListener("click", () => { jarvisBoot(); }, { once: true });
    // document.addEventListener("touchstart", () => { jarvisBoot(); }, { once: true });

    // === CHAT HISTORY ===
    const chatHistory = [];
    const historyList = document.getElementById("history-list");
    const historyPanel = document.getElementById("history-panel");

    let historyStarted = false;
    function addToHistory(role, text) {
      if (!text || !text.trim()) return;
      // Clear placeholder on first real message
      if (!historyStarted) {
        historyList.innerHTML = "";
        historyStarted = true;
      }
      const time = new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
      chatHistory.push({ role, text, time });
      const div = document.createElement("div");
      div.className = `history-item history-${role}`;
      div.innerHTML = `<span class="history-time">${time}</span> <span class="history-role">${role === "jarvis" ? "JARVIS" : "YOU"}</span>: ${text}`;
      historyList.appendChild(div);
      historyList.scrollTop = historyList.scrollHeight;
    }

    function toggleHistory() {
      const panel = document.getElementById("history-panel");
      panel.style.display = panel.style.display === "none" ? "flex" : "none";
      document.getElementById("history-toggle").textContent = panel.style.display === "none" ? "▲ History" : "▼ History";
    }

    // No auto-start — click orb or press space to talk

    // === DASHBOARD ===
    const dashboard = document.getElementById("dashboard");

    // Update clock every second
    function updateClock() {
      const now = new Date();
      const hours = now.getHours() % 12 || 12;
      const mins = now.getMinutes().toString().padStart(2, "0");
      const ampm = now.getHours() >= 12 ? "PM" : "AM";
      document.getElementById("hud-clock").textContent = `${hours}:${mins} ${ampm}`;

      const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      document.getElementById("hud-date").textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Fetch dashboard data
    async function refreshDashboard() {
      try {
        const resp = await fetch("/api/dashboard");
        const d = await resp.json();

        // Weather
        if (d.weather && d.weather.summary) {
          const match = d.weather.summary.match(/([\d.]+)F/);
          if (match) {
            document.getElementById("hud-temp").textContent = `${Math.round(parseFloat(match[1]))}°F`;
          }
          const condMatch = d.weather.summary.match(/\d+F,\s*(.+?),\s*wind/);
          if (condMatch) {
            document.getElementById("hud-condition").textContent = condMatch[1];
          }
        }

        // Portfolio
        if (d.portfolio) {
          const total = (d.portfolio.balance || 0) + (d.portfolio.portfolio_value || 0);
          document.getElementById("hud-balance").textContent = `$${total.toFixed(2)}`;
          const pnl = d.portfolio.pnl || 0;
          const pnlEl = document.getElementById("hud-pnl");
          pnlEl.textContent = `Cash: $${(d.portfolio.balance || 0).toFixed(2)} | P&L: ${pnl >= 0 ? "+" : ""}$${pnl.toFixed(2)}`;
          pnlEl.style.color = pnl >= 0 ? "rgba(0, 255, 150, 0.7)" : "rgba(255, 80, 80, 0.7)";
        }

        // Bot
        if (d.bot) {
          const statusEl = document.getElementById("hud-bot-status");
          statusEl.textContent = d.bot.running ? "ACTIVE" : "STOPPED";
          statusEl.style.color = d.bot.running ? "rgba(0, 255, 150, 0.9)" : "rgba(255, 80, 80, 0.9)";
          document.getElementById("hud-bot-detail").textContent = `${d.bot.scans || 0} scans | ${d.bot.trades || 0} trades`;
        }
      } catch (e) {
        console.log("Dashboard fetch error:", e);
      }
    }

    // Initial load + refresh every 30s
    refreshDashboard();
    setInterval(refreshDashboard, 30000);

    // Hide dashboard when talking, show when idle
    function hideDashboard() { dashboard.classList.add("hidden"); }
    function showDashboard() { dashboard.classList.remove("hidden"); }

    // ---- Camera Vision ----
    let cameraStream = null;

    function openCamera() {
      const overlay = document.getElementById("camera-overlay");
      const video = document.getElementById("camera-video");
      overlay.style.display = "flex";

      navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      }).then(stream => {
        cameraStream = stream;
        video.srcObject = stream;
      }).catch(err => {
        console.error("Camera error:", err);
        alert("Could not access camera. Check permissions.");
        closeCamera();
      });
    }

    function closeCamera() {
      const overlay = document.getElementById("camera-overlay");
      overlay.style.display = "none";
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }
    }

    async function snapPhoto() {
      const video = document.getElementById("camera-video");
      const canvas = document.getElementById("snap-canvas");
      const question = document.getElementById("camera-question").value.trim();

      // Capture frame
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);
      const imageData = canvas.toDataURL("image/jpeg", 0.8);

      // Close camera
      closeCamera();

      // Show thinking state
      isBusy = true;
      orb.setState("thinking");
      statusText.textContent = "Analyzing image...";
      stateLabel.textContent = "";

      try {
        const resp = await fetch("/api/vision", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            image: imageData,
            question: question || "What is this? Describe it briefly as JARVIS would — 2-3 sentences max.",
          }),
        });

        const jarvisText = decodeURIComponent(resp.headers.get("X-Jarvis-Text") || "");
        if (jarvisText) {
          transcriptJarvis.textContent = jarvisText;
          transcriptJarvis.classList.add("visible");
        }

        orb.setState("speaking");
        statusText.textContent = "Speaking";

        const audioBlob = await resp.blob();
        await playAudioWithOrb(audioBlob);

        orb.setState("idle");
        statusText.textContent = "Online";
        isBusy = false;
        setTimeout(showDashboard, 2000);
      } catch (err) {
        console.error("Vision error:", err);
        orb.setState("idle");
        statusText.textContent = "Error";
        isBusy = false;
      }
    }
    // Register service worker for PWA install
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
