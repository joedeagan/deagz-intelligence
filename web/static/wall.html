<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>JARVIS Wall</title>
<style>
  :root {
    --fc: #f2f2f7;      /* digit color — tap the clock to cycle */
    --fc-dim: #77777c;  /* secondary text */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: #0c0a08;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4.5vh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    transition: opacity 2s ease;
  }
  body.night { opacity: 0.22; }
  body.night #captions, body.night #jarvis-btn { visibility: hidden; }

  /* ---------- flip clock ---------- */
  #time-row {
    display: flex;
    align-items: center;
    gap: 2vw;
    cursor: pointer;
  }
  .flip-seg {
    background: linear-gradient(180deg, #1c1712 0%, #16120d 49%, #0f0c09 51%, #14100c 100%);
    border-radius: 2.5vw;
    padding: 2vh 3vw;
    font-family: "Segoe UI", -apple-system, sans-serif;
    font-variant-numeric: tabular-nums;
    font-size: 22vw;
    font-weight: 700;
    line-height: 1.1;
    color: var(--fc);
    text-shadow: 0 0 30px color-mix(in srgb, var(--fc) 30%, transparent);
    box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.06);
    position: relative;
  }
  .flip-seg::after {
    content: "";
    position: absolute;
    left: 0; right: 0; top: 50%;
    height: 2px;
    background: rgba(0,0,0,0.75);
  }
  #colon {
    font-size: 14vw;
    font-weight: 700;
    color: var(--fc);
    animation: blink 2s step-end infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
  #info {
    font-size: 2.2vw;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: var(--fc-dim);
    text-transform: uppercase;
  }

  /* ---------- jarvis voice ---------- */
  #captions {
    min-height: 9vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1vh;
    padding: 0 8vw;
    text-align: center;
    transition: opacity 0.6s ease;
  }
  #cap-you { font-size: 1.8vw; color: #6b6b70; font-weight: 400; }
  #cap-jarvis { font-size: 2.2vw; color: #d7d7dc; font-weight: 500; max-width: 84vw; }
  #jarvis-btn {
    display: flex;
    align-items: center;
    gap: 1vw;
    font-size: 1.7vw;
    font-weight: 600;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.6);
    background: rgba(120,120,120,0.14);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 999px;
    padding: 1.4vh 3vw;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: border-color 0.3s ease, color 0.3s ease;
  }
  #jarvis-btn .orb {
    width: 1.5vw; height: 1.5vw;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #9cc2ff, #4f8cff 60%, #1d4ed8);
    box-shadow: 0 0 12px rgba(79, 140, 255, 0.8);
    animation: orbpulse 3s ease-in-out infinite;
  }
  @keyframes orbpulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }
  #jarvis-btn.listening { border-color: rgba(255,69,58,0.7); color: #ff453a; }
  #jarvis-btn.listening .orb {
    background: radial-gradient(circle at 35% 35%, #ffb3ae, #ff453a 60%, #b3271e);
    box-shadow: 0 0 14px rgba(255,69,58,0.9);
    animation: orbpulse 0.9s ease-in-out infinite;
  }
  #jarvis-btn.busy { border-color: rgba(79,140,255,0.6); color: #9cc2ff; }
</style>
</head>
<body>

  <div id="time-row" title="Tap to change color">
    <span class="flip-seg" id="t-h">--</span>
    <span id="colon">:</span>
    <span class="flip-seg" id="t-m">--</span>
  </div>
  <div id="info"><span id="t-date"></span> &nbsp;·&nbsp; <span id="t-temp">--°</span> <span id="t-cond"></span></div>

  <div id="captions">
    <div id="cap-you"></div>
    <div id="cap-jarvis"></div>
  </div>

  <div id="jarvis-btn"><span class="orb"></span><span id="btn-label">JARVIS</span></div>

<script>
(() => {
  // ---------- clock ----------
  function tick() {
    const now = new Date();
    const h24 = now.getHours();
    document.getElementById('t-h').textContent = String(h24 % 12 || 12);
    document.getElementById('t-m').textContent = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('t-date').textContent =
      now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    document.body.classList.toggle('night', h24 >= 22 || h24 < 7);
  }
  tick();
  setInterval(tick, 1000);

  // ---------- colors (tap the digits to cycle) ----------
  const COLORS = [
    { name: 'White',    fc: '#f2f2f7', dim: '#77777c' },
    { name: 'Amber',    fc: '#ffb300', dim: '#8a6a2f' },
    { name: 'Ice Blue', fc: '#38bdf8', dim: '#2b6584' },
    { name: 'Green',    fc: '#34d399', dim: '#276b52' },
    { name: 'Red',      fc: '#ff453a', dim: '#8a3530' },
    { name: 'Purple',   fc: '#bf5af2', dim: '#63397c' },
  ];
  let color = parseInt(localStorage.getItem('wall_color') || '0', 10);
  if (isNaN(color) || color < 0 || color >= COLORS.length) color = 0;
  function applyColor() {
    document.documentElement.style.setProperty('--fc', COLORS[color].fc);
    document.documentElement.style.setProperty('--fc-dim', COLORS[color].dim);
    localStorage.setItem('wall_color', String(color));
  }
  document.getElementById('time-row').addEventListener('click', () => {
    color = (color + 1) % COLORS.length;
    applyColor();
  });
  applyColor();

  // ---------- weather (Open-Meteo, no key) ----------
  const WMO = {
    0:'clear',1:'mostly clear',2:'partly cloudy',3:'overcast',45:'foggy',48:'foggy',
    51:'drizzle',53:'drizzle',55:'drizzle',56:'freezing drizzle',57:'freezing drizzle',
    61:'light rain',63:'rain',65:'heavy rain',66:'freezing rain',67:'freezing rain',
    71:'light snow',73:'snow',75:'heavy snow',77:'snow grains',
    80:'showers',81:'showers',82:'heavy showers',85:'snow showers',86:'snow showers',
    95:'thunderstorm',96:'thunderstorm',99:'thunderstorm'
  };
  async function fetchWeather() {
    try {
      const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.0814&longitude=-81.519'
        + '&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=America%2FNew_York');
      if (!res.ok) throw new Error(res.status);
      const d = await res.json();
      document.getElementById('t-temp').textContent = Math.round(d.current.temperature_2m) + '°';
      document.getElementById('t-cond').textContent = WMO[d.current.weather_code] || '';
    } catch (e) {
      setTimeout(fetchWeather, 60 * 1000);
    }
  }
  fetchWeather();
  setInterval(fetchWeather, 15 * 60 * 1000);

  // ---------- jarvis voice (same-origin API, no iframe) ----------
  const btn = document.getElementById('jarvis-btn');
  const label = document.getElementById('btn-label');
  const capYou = document.getElementById('cap-you');
  const capJarvis = document.getElementById('cap-jarvis');
  const captions = document.getElementById('captions');
  const audioEl = new Audio(); // reused element — unlocked by the first tap
  const SILENT_WAV = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
  let state = 'idle'; // idle | listening | thinking | speaking
  let fadeTimer = null;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  function setState(s, text) {
    state = s;
    btn.classList.toggle('listening', s === 'listening');
    btn.classList.toggle('busy', s === 'thinking' || s === 'speaking');
    label.textContent = text || 'JARVIS';
  }

  function showCaptions(you, jarvis) {
    clearTimeout(fadeTimer);
    captions.style.opacity = '1';
    if (you !== null) capYou.textContent = you;
    if (jarvis !== null) capJarvis.textContent = jarvis;
  }
  function fadeCaptionsSoon(ms) {
    clearTimeout(fadeTimer);
    fadeTimer = setTimeout(() => { captions.style.opacity = '0'; }, ms);
  }

  async function askJarvis(message) {
    setState('thinking', 'THINKING…');
    try {
      const res = await fetch('/api/chat-and-speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const replyHeader = res.headers.get('X-Jarvis-Text');
      const reply = replyHeader ? decodeURIComponent(replyHeader) : '';
      const blob = await res.blob();
      showCaptions(null, reply);
      setState('speaking', 'SPEAKING…');
      audioEl.src = URL.createObjectURL(blob);
      audioEl.onended = () => { setState('idle'); fadeCaptionsSoon(6000); };
      audioEl.onerror = () => { setState('idle'); fadeCaptionsSoon(6000); };
      await audioEl.play();
    } catch (e) {
      showCaptions(null, 'Jarvis is unreachable right now.');
      setState('idle');
      fadeCaptionsSoon(4000);
    }
  }

  btn.addEventListener('click', () => {
    if (state === 'listening') return;
    if (state === 'speaking') { // tap while speaking = stop
      audioEl.pause();
      setState('idle');
      return;
    }
    if (!SR) {
      showCaptions(null, 'Voice input is not supported in this browser.');
      fadeCaptionsSoon(4000);
      return;
    }
    // unlock audio playback for later (must happen inside a tap)
    audioEl.src = SILENT_WAV;
    audioEl.play().catch(() => {});

    const rec = new SR();
    rec.lang = 'en-US';
    rec.continuous = false;
    rec.interimResults = false;
    setState('listening', 'LISTENING…');
    showCaptions('', '');
    rec.onresult = (ev) => {
      const transcript = ev.results[0][0].transcript;
      showCaptions('“' + transcript + '”', '');
      askJarvis(transcript);
    };
    rec.onerror = (ev) => {
      setState('idle');
      showCaptions(null, ev.error === 'not-allowed'
        ? 'Microphone blocked — allow it in Safari settings.'
        : 'Didn’t catch that — tap and try again.');
      fadeCaptionsSoon(4000);
    };
    rec.onend = () => { if (state === 'listening') setState('idle'); };
    rec.start();
  });

  // ---------- keep screen awake (backup to Auto-Lock: Never) ----------
  async function keepAwake() {
    try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch (e) {}
  }
  keepAwake();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') keepAwake();
  });
})();
</script>
</body>
</html>
