<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>JARVIS Wall</title>
<style>
  :root {
    --fc: #f2f2f7;      /* digit color — tap the clock to cycle */
    --fc-dim: #77777c;  /* secondary text */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: #0c0a08;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4.5vh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    transition: opacity 2s ease;
  }
  body.night { opacity: 0.22; }
  body.night #captions, body.night #jarvis-btn, body.night #btn-label, body.night #movie-launch { visibility: hidden; }

  /* movie launch fallback button (appears if the popup gets blocked) */
  #movie-launch {
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 2vw;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: #0c0a08;
    background: var(--fc);
    border-radius: 999px;
    padding: 1.6vh 4vw;
    cursor: pointer;
    box-shadow: 0 0 3vh color-mix(in srgb, var(--fc) 45%, transparent);
  }

  /* ---------- flip clock ---------- */
  #time-row {
    display: flex;
    align-items: center;
    gap: 2vw;
    cursor: pointer;
  }
  .flip-seg {
    background: linear-gradient(180deg, #1c1712 0%, #16120d 49%, #0f0c09 51%, #14100c 100%);
    border-radius: 2.5vw;
    padding: 2vh 3vw;
    font-family: "Segoe UI", -apple-system, sans-serif;
    font-variant-numeric: tabular-nums;
    font-size: 22vw;
    font-weight: 700;
    line-height: 1.1;
    color: var(--fc);
    text-shadow: 0 0 30px color-mix(in srgb, var(--fc) 30%, transparent);
    box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.06);
    position: relative;
  }
  .flip-seg::after {
    content: "";
    position: absolute;
    left: 0; right: 0; top: 50%;
    height: 2px;
    background: rgba(0,0,0,0.75);
  }
  #colon {
    font-size: 14vw;
    font-weight: 700;
    color: var(--fc);
    animation: blink 2s step-end infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
  #info {
    font-size: 2.2vw;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: var(--fc-dim);
    text-transform: uppercase;
  }

  /* ---------- jarvis voice ---------- */
  #captions {
    min-height: 9vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1vh;
    padding: 0 8vw;
    text-align: center;
    transition: opacity 0.6s ease;
  }
  #cap-you { font-size: 1.8vw; color: #6b6b70; font-weight: 400; }
  #cap-jarvis { font-size: 2.2vw; color: #d7d7dc; font-weight: 500; max-width: 84vw; }
  /* arc-reactor orb button — state color via --jc */
  #jarvis-btn {
    --jc: #4f8cff;
    position: relative;
    width: 13vh; height: 13vh;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #jarvis-btn .core {
    width: 6.2vh; height: 6.2vh;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 34%,
      #fff 0%,
      color-mix(in srgb, var(--jc) 55%, #fff) 22%,
      var(--jc) 60%,
      color-mix(in srgb, var(--jc) 45%, #000) 100%);
    box-shadow:
      0 0 2.2vh color-mix(in srgb, var(--jc) 85%, transparent),
      0 0 5.5vh color-mix(in srgb, var(--jc) 45%, transparent),
      inset 0 0 1.4vh rgba(255,255,255,0.55);
    animation: corepulse 3.2s ease-in-out infinite;
    transition: background 0.4s ease;
    will-change: transform, filter;
  }
  @keyframes corepulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  #jarvis-btn .ring {
    position: absolute;
    border-radius: 50%;
    border: 0.28vh solid transparent;
  }
  #jarvis-btn .r1 {
    inset: 0.8vh;
    border-top-color: var(--jc);
    border-right-color: color-mix(in srgb, var(--jc) 35%, transparent);
    animation: spin 4.5s linear infinite;
  }
  #jarvis-btn .r2 {
    inset: 2.4vh;
    border-bottom-color: color-mix(in srgb, var(--jc) 70%, transparent);
    border-left-color: color-mix(in srgb, var(--jc) 25%, transparent);
    animation: spin 7s linear infinite reverse;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #jarvis-btn .sonar {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 0.32vh solid var(--jc);
    opacity: 0;
    pointer-events: none;
  }
  #jarvis-btn.listening .sonar { animation: sonar 1.6s ease-out infinite; }
  #jarvis-btn.listening .s2 { animation-delay: 0.8s; }
  @keyframes sonar {
    0%   { transform: scale(0.55); opacity: 0.85; }
    100% { transform: scale(1.75); opacity: 0; }
  }
  #jarvis-btn.listening { --jc: #ff453a; }
  #jarvis-btn.listening .core { animation: corepulse 0.8s ease-in-out infinite; }
  #jarvis-btn.thinking { --jc: #ffb300; }
  #jarvis-btn.thinking .r1 { animation-duration: 0.9s; }
  #jarvis-btn.thinking .r2 { animation-duration: 1.4s; }
  #jarvis-btn.speaking { --jc: #22d3ee; }
  #jarvis-btn.speaking .core { animation: none; } /* voice drives it instead */
  #btn-label {
    font-size: 1.5vw;
    font-weight: 600;
    letter-spacing: 0.35em;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    margin-top: -1vh;
    transition: color 0.3s ease;
  }
  #jarvis-btn.listening + #btn-label { color: #ff453a; }
  #jarvis-btn.thinking + #btn-label { color: #ffb300; }
  #jarvis-btn.speaking + #btn-label { color: #22d3ee; }
</style>
</head>
<body>

  <div id="time-row" title="Tap to change color">
    <span class="flip-seg" id="t-h">--</span>
    <span id="colon">:</span>
    <span class="flip-seg" id="t-m">--</span>
  </div>
  <div id="info"><span id="t-date"></span> &nbsp;·&nbsp; <span id="t-temp">--°</span> <span id="t-cond"></span></div>

  <div id="captions">
    <div id="cap-you"></div>
    <div id="cap-jarvis"></div>
  </div>

  <div id="jarvis-btn">
    <div class="sonar s1"></div>
    <div class="sonar s2"></div>
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="core"></div>
  </div>
  <div id="btn-label">JARVIS</div>
  <div id="movie-launch"></div>

<script>
(() => {
  // ---------- clock ----------
  let wakeUntil = 0; // tapping at night wakes the full display for a while
  function tick() {
    const now = new Date();
    const h24 = now.getHours();
    document.getElementById('t-h').textContent = String(h24 % 12 || 12);
    document.getElementById('t-m').textContent = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('t-date').textContent =
      now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    const isNightHours = h24 >= 22 || h24 < 7;
    document.body.classList.toggle('night', isNightHours && Date.now() > wakeUntil);
  }
  tick();
  setInterval(tick, 1000);
  document.body.addEventListener('click', () => {
    if (document.body.classList.contains('night')) {
      wakeUntil = Date.now() + 2 * 60 * 1000;
      tick();
    }
  });

  // ---------- colors (tap the digits to cycle) ----------
  const COLORS = [
    { name: 'White',    fc: '#f2f2f7', dim: '#77777c' },
    { name: 'Amber',    fc: '#ffb300', dim: '#8a6a2f' },
    { name: 'Ice Blue', fc: '#38bdf8', dim: '#2b6584' },
    { name: 'Green',    fc: '#34d399', dim: '#276b52' },
    { name: 'Red',      fc: '#ff453a', dim: '#8a3530' },
    { name: 'Purple',   fc: '#bf5af2', dim: '#63397c' },
  ];
  let color = parseInt(localStorage.getItem('wall_color') || '0', 10);
  if (isNaN(color) || color < 0 || color >= COLORS.length) color = 0;
  function applyColor() {
    document.documentElement.style.setProperty('--fc', COLORS[color].fc);
    document.documentElement.style.setProperty('--fc-dim', COLORS[color].dim);
    localStorage.setItem('wall_color', String(color));
  }
  document.getElementById('time-row').addEventListener('click', () => {
    color = (color + 1) % COLORS.length;
    applyColor();
  });
  applyColor();

  // ---------- weather (Open-Meteo, no key) ----------
  const WMO = {
    0:'clear',1:'mostly clear',2:'partly cloudy',3:'overcast',45:'foggy',48:'foggy',
    51:'drizzle',53:'drizzle',55:'drizzle',56:'freezing drizzle',57:'freezing drizzle',
    61:'light rain',63:'rain',65:'heavy rain',66:'freezing rain',67:'freezing rain',
    71:'light snow',73:'snow',75:'heavy snow',77:'snow grains',
    80:'showers',81:'showers',82:'heavy showers',85:'snow showers',86:'snow showers',
    95:'thunderstorm',96:'thunderstorm',99:'thunderstorm'
  };
  async function fetchWeather() {
    try {
      const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.0814&longitude=-81.519'
        + '&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=America%2FNew_York');
      if (!res.ok) throw new Error(res.status);
      const d = await res.json();
      document.getElementById('t-temp').textContent = Math.round(d.current.temperature_2m) + '°';
      document.getElementById('t-cond').textContent = WMO[d.current.weather_code] || '';
    } catch (e) {
      setTimeout(fetchWeather, 60 * 1000);
    }
  }
  fetchWeather();
  setInterval(fetchWeather, 15 * 60 * 1000);

  // ---------- jarvis voice (same-origin API, no iframe) ----------
  const btn = document.getElementById('jarvis-btn');
  const label = document.getElementById('btn-label');
  const capYou = document.getElementById('cap-you');
  const capJarvis = document.getElementById('cap-jarvis');
  const captions = document.getElementById('captions');
  const audioEl = new Audio(); // reused element — unlocked by the first tap
  const SILENT_WAV = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
  let state = 'idle'; // idle | listening | thinking | speaking
  let fadeTimer = null;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  function setState(s, text) {
    state = s;
    btn.classList.toggle('listening', s === 'listening');
    btn.classList.toggle('thinking', s === 'thinking');
    btn.classList.toggle('speaking', s === 'speaking');
    label.textContent = text || 'JARVIS';
  }

  // ---------- voice-reactive core: the orb pulses to Jarvis's actual voice ----------
  const core = btn.querySelector('.core');
  let actx = null, analyser = null, freqData = null, rafId = null;
  function setupAnalyser() {
    if (actx) { actx.resume().catch(() => {}); return; }
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      actx = new AC();
      const src = actx.createMediaElementSource(audioEl);
      analyser = actx.createAnalyser();
      analyser.fftSize = 128;
      src.connect(analyser);
      analyser.connect(actx.destination);
      freqData = new Uint8Array(analyser.frequencyBinCount);
      actx.resume().catch(() => {});
    } catch (e) { actx = null; analyser = null; } // fallback: audio still plays, orb just won't react
  }
  function pulseLoop() {
    if (state !== 'speaking' || !analyser) {
      core.style.transform = '';
      core.style.filter = '';
      return;
    }
    analyser.getByteFrequencyData(freqData);
    let sum = 0;
    for (let i = 0; i < freqData.length; i++) sum += freqData[i];
    const level = sum / freqData.length / 255; // 0..1
    core.style.transform = 'scale(' + (1 + level * 0.55) + ')';
    core.style.filter = 'brightness(' + (1 + level * 1.2) + ')';
    rafId = requestAnimationFrame(pulseLoop);
  }

  function showCaptions(you, jarvis) {
    clearTimeout(fadeTimer);
    captions.style.opacity = '1';
    if (you !== null) capYou.textContent = you;
    if (jarvis !== null) capJarvis.textContent = jarvis;
  }
  function fadeCaptionsSoon(ms) {
    clearTimeout(fadeTimer);
    fadeTimer = setTimeout(() => { captions.style.opacity = '0'; }, ms);
  }

  // ---------- movie library (names/ids only — playback auths via Jellyfin's own login) ----------
  let LIB = { movies: [] };
  fetch('/static/library.json').then(r => r.json()).then(j => { LIB = j; }).catch(() => {});
  const launchBtn = document.getElementById('movie-launch');

  const norm = s => s.toLowerCase().replace(/[^a-z0-9 ]/g, ' ').replace(/\s+/g, ' ').trim();
  function findMovie(text) {
    const t = norm(text);
    if (!t) return null;
    let best = null;
    for (const m of (LIB.movies || [])) {
      const n = norm(m.name);
      if (t.includes(n) || n.includes(t)) {
        if (!best || n.length > norm(best.name).length) best = m;
      }
    }
    return best;
  }
  function movieCommand(transcript) {
    const t = transcript.toLowerCase();
    if (/what movies|movie list|list (of )?movies|what do we have|what can we watch/.test(t)) return { type: 'list' };
    // TV transport controls
    const aboutTv = /\b(tv|television|movie|film|big screen)\b/.test(t);
    if (/\bpause\b/.test(t) && aboutTv) return { type: 'tv', command: 'Pause' };
    if (/\b(resume|unpause|continue|keep (playing|going))\b/.test(t)) return { type: 'tv', command: 'Unpause' };
    if (/\bstop\b/.test(t) && aboutTv) return { type: 'tv', command: 'Stop' };
    // play <movie> [on the tv]
    const m = t.match(/^(?:hey jarvis[,! ]*)?(?:can you |could you |please )?(?:play|watch|put on|start)\b(.*)$/i);
    if (m && m[1]) {
      const tvSuffix = /\s+on (?:the )?(?:tv|television|big screen)\s*[.!?]*\s*$/i;
      const onTv = tvSuffix.test(m[1]);
      const movie = findMovie(m[1].replace(tvSuffix, '').replace(/^(the movie|movie)\s+/i, ''));
      if (movie) return { type: onTv ? 'play_tv' : 'play', movie };
    }
    return null;
  }

  // hand a command to the home agent (the laptop) via the cloud queue
  async function sendToAgent(type, payload, confirmLine) {
    try {
      const res = await fetch('/api/agent/enqueue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type, payload })
      });
      if (!res.ok) throw new Error(res.status);
      speakText(confirmLine);
    } catch (e) {
      speakText('I could not reach the house systems, sir.');
    }
  }

  // speak a fixed line in Jarvis's voice (no brain round-trip)
  async function speakText(text) {
    setState('thinking', 'THINKING…');
    try {
      const res = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      if (!res.ok) throw new Error(res.status);
      const blob = await res.blob();
      showCaptions(null, text);
      setState('speaking', 'SPEAKING…');
      audioEl.src = URL.createObjectURL(blob);
      audioEl.onended = () => { setState('idle'); cancelAnimationFrame(rafId); pulseLoop(); fadeCaptionsSoon(8000); };
      audioEl.onerror = () => { setState('idle'); cancelAnimationFrame(rafId); pulseLoop(); fadeCaptionsSoon(8000); };
      await audioEl.play();
      pulseLoop();
    } catch (e) {
      showCaptions(null, text); // no voice, still show it
      setState('idle');
      fadeCaptionsSoon(6000);
    }
  }

  function playMovie(movie) {
    const url = 'http://' + LIB.host + ':' + LIB.port + '/web/index.html#/details?id=' + movie.id
      + (LIB.serverId ? '&serverId=' + LIB.serverId : '');
    speakText('Playing ' + movie.name + ', sir.');
    const w = window.open(url, '_blank');
    if (!w) { // popup blocked — show a tap target instead
      launchBtn.textContent = '▶  ' + movie.name.toUpperCase();
      launchBtn.style.display = 'flex';
      launchBtn.onclick = () => { window.open(url, '_blank'); launchBtn.style.display = 'none'; };
      setTimeout(() => { launchBtn.style.display = 'none'; }, 60000);
    }
  }

  async function askJarvis(message) {
    setState('thinking', 'THINKING…');
    try {
      const res = await fetch('/api/chat-and-speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const replyHeader = res.headers.get('X-Jarvis-Text');
      const reply = replyHeader ? decodeURIComponent(replyHeader) : '';
      const blob = await res.blob();
      showCaptions(null, reply);
      setState('speaking', 'SPEAKING…');
      audioEl.src = URL.createObjectURL(blob);
      audioEl.onended = () => { setState('idle'); cancelAnimationFrame(rafId); pulseLoop(); fadeCaptionsSoon(6000); };
      audioEl.onerror = () => { setState('idle'); cancelAnimationFrame(rafId); pulseLoop(); fadeCaptionsSoon(6000); };
      await audioEl.play();
      pulseLoop();
    } catch (e) {
      showCaptions(null, 'Jarvis is unreachable right now.');
      setState('idle');
      fadeCaptionsSoon(4000);
    }
  }

  btn.addEventListener('click', () => {
    if (state === 'listening') return;
    if (state === 'speaking') { // tap while speaking = stop
      audioEl.pause();
      setState('idle');
      return;
    }
    if (!SR) {
      showCaptions(null, 'Voice input is not supported in this browser.');
      fadeCaptionsSoon(4000);
      return;
    }
    // unlock audio playback + audio analysis for later (must happen inside a tap)
    setupAnalyser();
    audioEl.src = SILENT_WAV;
    audioEl.play().catch(() => {});

    const rec = new SR();
    rec.lang = 'en-US';
    rec.continuous = false;
    rec.interimResults = false;
    setState('listening', 'LISTENING…');
    showCaptions('', '');
    rec.onresult = (ev) => {
      const transcript = ev.results[0][0].transcript;
      showCaptions('“' + transcript + '”', '');
      const cmd = movieCommand(transcript);
      if (cmd && cmd.type === 'play') {
        playMovie(cmd.movie);
      } else if (cmd && cmd.type === 'play_tv') {
        sendToAgent('play_on_tv', { itemId: cmd.movie.id, name: cmd.movie.name },
          'Playing ' + cmd.movie.name + ' on the television, sir.');
      } else if (cmd && cmd.type === 'tv') {
        sendToAgent('tv_command', { command: cmd.command },
          cmd.command === 'Pause' ? 'Pausing, sir.'
          : cmd.command === 'Unpause' ? 'Resuming playback.'
          : 'Stopping playback, sir.');
      } else if (cmd && cmd.type === 'list') {
        const names = (LIB.movies || []).map(m => m.name);
        speakText(names.length
          ? 'We have ' + names.length + (names.length === 1 ? ' film: ' : ' films: ') + names.join(', ') + '.'
          : 'The library is empty, sir. A tragedy, frankly.');
      } else {
        askJarvis(transcript);
      }
    };
    rec.onerror = (ev) => {
      setState('idle');
      showCaptions(null, ev.error === 'not-allowed'
        ? 'Microphone blocked — allow it in Safari settings.'
        : 'Didn’t catch that — tap and try again.');
      fadeCaptionsSoon(4000);
    };
    rec.onend = () => { if (state === 'listening') setState('idle'); };
    rec.start();
  });

  // ---------- keep screen awake (backup to Auto-Lock: Never) ----------
  async function keepAwake() {
    try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch (e) {}
  }
  keepAwake();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') keepAwake();
  });
})();
</script>
</body>
</html>
