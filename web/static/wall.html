<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>JARVIS Wall</title>
<style>
  :root {
    --fc: #f2f2f7;      /* digit color — tap the clock to cycle */
    --fc-dim: #77777c;  /* secondary text */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: #0c0a08;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4.5vh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    transition: opacity 2s ease;
  }
  body.night { opacity: 0.22; }
  body.night #captions, body.night #jarvis-btn, body.night #btn-label, body.night #movie-launch { visibility: hidden; }

  /* daily art layer (toggled by tapping the date line) */
  #wallart {
    position: fixed;
    inset: 0;
    z-index: -1;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 2s ease;
  }
  body.night #wallart { opacity: 0 !important; }

  /* tiny mic diagnostic readout */
  #dbg {
    position: fixed;
    bottom: 1.8vh;
    right: 1.5vw;
    font-size: 1.1vw;
    font-family: Consolas, Menlo, monospace;
    color: #6b6b70;
    opacity: 0.55;
    z-index: 6;
    text-align: right;
  }
  body.night #dbg { visibility: hidden; }

  /* movie launch fallback button (appears if the popup gets blocked) */
  #movie-launch {
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 2vw;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: #0c0a08;
    background: var(--fc);
    border-radius: 999px;
    padding: 1.6vh 4vw;
    cursor: pointer;
    box-shadow: 0 0 3vh color-mix(in srgb, var(--fc) 45%, transparent);
  }

  /* ---------- flip clock ---------- */
  #time-row {
    display: flex;
    align-items: center;
    gap: 2vw;
    cursor: pointer;
  }
  .flip-seg {
    background: linear-gradient(180deg, #1c1712 0%, #16120d 49%, #0f0c09 51%, #14100c 100%);
    border-radius: 2.5vw;
    padding: 2vh 3vw;
    font-family: "Segoe UI", -apple-system, sans-serif;
    font-variant-numeric: tabular-nums;
    font-size: 22vw;
    font-weight: 700;
    line-height: 1.1;
    color: var(--fc);
    text-shadow: 0 0 30px color-mix(in srgb, var(--fc) 30%, transparent);
    box-shadow: 0 10px 40px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.06);
    position: relative;
  }
  .flip-seg::after {
    content: "";
    position: absolute;
    left: 0; right: 0; top: 50%;
    height: 2px;
    background: rgba(0,0,0,0.75);
  }
  #colon {
    font-size: 14vw;
    font-weight: 700;
    color: var(--fc);
    animation: blink 2s step-end infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
  #info {
    font-size: 2.2vw;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: var(--fc-dim);
    text-transform: uppercase;
  }
  #timer {
    display: none;
    font-size: 3.2vw;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.2em;
    color: var(--fc);
    text-shadow: 0 0 24px color-mix(in srgb, var(--fc) 35%, transparent);
  }

  /* ---------- jarvis voice ---------- */
  #captions {
    min-height: 9vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1vh;
    padding: 0 8vw;
    text-align: center;
    transition: opacity 0.6s ease;
  }
  /* each caption line rides its own dark pill — wall art can't wash it out */
  #cap-you, #cap-jarvis {
    background: rgba(8, 6, 4, 0.62);
    border-radius: 1.4vw;
    padding: 0.9vh 1.8vw;
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
  }
  #cap-you { font-size: 1.8vw; color: #8e8e93; font-weight: 400; }
  #cap-jarvis {
    font-size: 2.2vw; color: #d7d7dc; font-weight: 500; max-width: 84vw;
    /* long replies clamp at 4 lines — the voice carries the rest; unclamped
       text used to shove the whole column past the screen edge */
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  #cap-you:empty, #cap-jarvis:empty { display: none; }
  /* arc-reactor orb button — state color via --jc */
  #jarvis-btn {
    --jc: #4f8cff;
    position: relative;
    width: 13vh; height: 13vh;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #jarvis-btn .core {
    width: 6.2vh; height: 6.2vh;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 34%,
      #fff 0%,
      color-mix(in srgb, var(--jc) 55%, #fff) 22%,
      var(--jc) 60%,
      color-mix(in srgb, var(--jc) 45%, #000) 100%);
    box-shadow:
      0 0 2.2vh color-mix(in srgb, var(--jc) 85%, transparent),
      0 0 5.5vh color-mix(in srgb, var(--jc) 45%, transparent),
      inset 0 0 1.4vh rgba(255,255,255,0.55);
    animation: corepulse 3.2s ease-in-out infinite;
    transition: background 0.4s ease;
    will-change: transform, filter;
  }
  @keyframes corepulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  #jarvis-btn .ring {
    position: absolute;
    border-radius: 50%;
    border: 0.28vh solid transparent;
  }
  #jarvis-btn .r1 {
    inset: 0.8vh;
    border-top-color: var(--jc);
    border-right-color: color-mix(in srgb, var(--jc) 35%, transparent);
    animation: spin 4.5s linear infinite;
  }
  #jarvis-btn .r2 {
    inset: 2.4vh;
    border-bottom-color: color-mix(in srgb, var(--jc) 70%, transparent);
    border-left-color: color-mix(in srgb, var(--jc) 25%, transparent);
    animation: spin 7s linear infinite reverse;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #jarvis-btn .sonar {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 0.32vh solid var(--jc);
    opacity: 0;
    pointer-events: none;
  }
  #jarvis-btn.listening .sonar { animation: sonar 1.6s ease-out infinite; }
  #jarvis-btn.listening .s2 { animation-delay: 0.8s; }
  @keyframes sonar {
    0%   { transform: scale(0.55); opacity: 0.85; }
    100% { transform: scale(1.75); opacity: 0; }
  }
  #jarvis-btn.listening { --jc: #ff453a; }
  #jarvis-btn.listening .core { animation: corepulse 0.8s ease-in-out infinite; }
  #jarvis-btn.thinking { --jc: #ffb300; }
  #jarvis-btn.thinking .r1 { animation-duration: 0.9s; }
  #jarvis-btn.thinking .r2 { animation-duration: 1.4s; }
  #jarvis-btn.speaking { --jc: #22d3ee; }
  #jarvis-btn.speaking .core { animation: none; } /* voice drives it instead */
  #btn-label {
    font-size: 1.5vw;
    font-weight: 600;
    letter-spacing: 0.35em;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    margin-top: -1vh;
    transition: color 0.3s ease;
  }
  #jarvis-btn.listening + #btn-label { color: #ff453a; }
  #jarvis-btn.thinking + #btn-label { color: #ffb300; }
  #jarvis-btn.speaking + #btn-label { color: #22d3ee; }
</style>
</head>
<body>

  <div id="time-row" title="Tap to change color">
    <span class="flip-seg" id="t-h">--</span>
    <span id="colon">:</span>
    <span class="flip-seg" id="t-m">--</span>
  </div>
  <div id="info"><span id="t-date"></span> &nbsp;·&nbsp; <span id="t-temp">--°</span> <span id="t-cond"></span></div>
  <div id="timer"></div>

  <div id="captions">
    <div id="cap-you"></div>
    <div id="cap-jarvis"></div>
  </div>

  <div id="jarvis-btn">
    <div class="sonar s1"></div>
    <div class="sonar s2"></div>
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="core"></div>
  </div>
  <div id="btn-label">JARVIS</div>
  <div id="movie-launch"></div>
  <div id="dbg"></div>

<script>
(() => {
  // ---------- clock ----------
  // ---------- timer & alarm ----------
  const timerEl = document.getElementById('timer');
  let timerEnd = parseInt(localStorage.getItem('timer_end') || '0', 10) || 0;
  let alarmAt = localStorage.getItem('alarm_at') || '';
  let alarmDisp = localStorage.getItem('alarm_disp') || '';
  if (timerEnd && timerEnd < Date.now()) { timerEnd = 0; localStorage.removeItem('timer_end'); }
  function fmtLeft(secs) {
    const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60), s = secs % 60;
    return (h ? h + ':' + String(m).padStart(2, '0') : String(m)) + ':' + String(s).padStart(2, '0');
  }
  function updateTimer(now) {
    let txt = '';
    if (timerEnd) {
      const left = Math.ceil((timerEnd - now.getTime()) / 1000);
      if (left <= 0) {
        timerEnd = 0;
        localStorage.removeItem('timer_end');
        speakText('Sir — your timer is up.');
      } else {
        txt = '⏱ ' + fmtLeft(left);
      }
    }
    if (alarmAt) {
      txt += (txt ? ' ' : '') + '⏰ ' + alarmDisp;
      const hm = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
      if (hm === alarmAt) {
        alarmAt = ''; alarmDisp = '';
        localStorage.removeItem('alarm_at');
        localStorage.removeItem('alarm_disp');
        // wake-up = alarm line AND the full morning briefing if the brain delivers
        playBriefing('Good morning, sir. This is your ' + hm.replace(/^0/, '') + ' alarm.');
      }
    }
    timerEl.textContent = txt;
    timerEl.style.display = txt ? 'block' : 'none';
  }

  let wakeUntil = 0; // tapping at night wakes the full display for a while
  // "goodnight" forces night mode ahead of 10pm — cleared at 7am or by "good morning"
  let nightOverrideUntil = parseInt(localStorage.getItem('wall_night_until') || '0', 10) || 0;
  if (nightOverrideUntil && nightOverrideUntil < Date.now()) {
    nightOverrideUntil = 0;
    localStorage.removeItem('wall_night_until');
  }
  function tick() {
    const now = new Date();
    const h24 = now.getHours();
    document.getElementById('t-h').textContent = String(h24 % 12 || 12);
    document.getElementById('t-m').textContent = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('t-date').textContent =
      now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    const isNightHours = (h24 >= 22 || h24 < 7) || Date.now() < nightOverrideUntil;
    document.body.classList.toggle('night', isNightHours && Date.now() > wakeUntil);
    updateTimer(now);
  }
  tick();
  setInterval(tick, 1000);
  document.body.addEventListener('click', (e) => {
    if (document.body.classList.contains('night')) {
      wakeUntil = Date.now() + 2 * 60 * 1000;
      tick();
    }
    // ANY tap unlocks Jarvis's voice — a freshly reloaded wall used to stay
    // mute for announcements until the orb specifically was tapped (iOS
    // autoplay rules). The orb's own handler does its own unlock first.
    if (!e.target.closest('#jarvis-btn') && !audioUnlocked) {
      audioEl.src = SILENT_WAV;
      audioEl.play().then(() => { audioUnlocked = true; }).catch(() => {});
    }
    // any tap (except the orb) enters true fullscreen — hides the iPad status bar
    if (!e.target.closest('#jarvis-btn') && !document.fullscreenElement && !document.webkitFullscreenElement) {
      const de = document.documentElement;
      try {
        const r = de.requestFullscreen ? de.requestFullscreen()
          : de.webkitRequestFullscreen ? de.webkitRequestFullscreen() : null;
        if (r && r.catch) r.catch(() => {});
      } catch (err) { /* not supported — no harm */ }
    }
  });

  // ---------- colors (tap the digits to cycle) ----------
  const COLORS = [
    { name: 'White',    fc: '#f2f2f7', dim: '#77777c' },
    { name: 'Amber',    fc: '#ffb300', dim: '#8a6a2f' },
    { name: 'Ice Blue', fc: '#38bdf8', dim: '#2b6584' },
    { name: 'Green',    fc: '#34d399', dim: '#276b52' },
    { name: 'Red',      fc: '#ff453a', dim: '#8a3530' },
    { name: 'Purple',   fc: '#bf5af2', dim: '#63397c' },
  ];
  let color = parseInt(localStorage.getItem('wall_color') || '0', 10);
  if (isNaN(color) || color < 0 || color >= COLORS.length) color = 0;
  function applyColor() {
    document.documentElement.style.setProperty('--fc', COLORS[color].fc);
    document.documentElement.style.setProperty('--fc-dim', COLORS[color].dim);
    localStorage.setItem('wall_color', String(color));
  }
  document.getElementById('time-row').addEventListener('click', () => {
    color = (color + 1) % COLORS.length;
    applyColor();
  });
  applyColor();

  // ---------- weather (Open-Meteo, no key) ----------
  const WMO = {
    0:'clear',1:'mostly clear',2:'partly cloudy',3:'overcast',45:'foggy',48:'foggy',
    51:'drizzle',53:'drizzle',55:'drizzle',56:'freezing drizzle',57:'freezing drizzle',
    61:'light rain',63:'rain',65:'heavy rain',66:'freezing rain',67:'freezing rain',
    71:'light snow',73:'snow',75:'heavy snow',77:'snow grains',
    80:'showers',81:'showers',82:'heavy showers',85:'snow showers',86:'snow showers',
    95:'thunderstorm',96:'thunderstorm',99:'thunderstorm'
  };
  async function fetchWeather() {
    try {
      const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.0814&longitude=-81.519'
        + '&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=America%2FNew_York');
      if (!res.ok) throw new Error(res.status);
      const d = await res.json();
      document.getElementById('t-temp').textContent = Math.round(d.current.temperature_2m) + '°';
      document.getElementById('t-cond').textContent = WMO[d.current.weather_code] || '';
    } catch (e) {
      setTimeout(fetchWeather, 60 * 1000);
    }
  }
  fetchWeather();
  setInterval(fetchWeather, 15 * 60 * 1000);

  // ---------- jarvis voice (same-origin API, no iframe) ----------
  const btn = document.getElementById('jarvis-btn');
  const label = document.getElementById('btn-label');
  const capYou = document.getElementById('cap-you');
  const capJarvis = document.getElementById('cap-jarvis');
  const captions = document.getElementById('captions');
  const audioEl = new Audio(); // reused element — unlocked by the first tap
  let audioUnlocked = false;   // unlock must happen ONCE; re-running it steals the mic's audio session
  // interruption: every interaction has a generation id; tapping bumps it so
  // stale in-flight responses can't play over a new one, and aborts the fetch
  let jarvisGen = 0;
  let activeAbort = null;
  function interruptJarvis() {
    jarvisGen++;                         // invalidate any in-flight response
    try { if (activeAbort) activeAbort.abort(); } catch (e) {}
    activeAbort = null;
    try { releaseAudio(); } catch (e) {} // stop whatever he's saying
    try { cancelAnimationFrame(rafId); } catch (e) {}
  }
  let lastAudioEnd = 0; // the mic must NOT be grabbed inside the release window
  function releaseAudio() {
    // fully unload the player — a finished-but-loaded <audio> keeps its claim
    // on the iPad's audio session and can block the mic from taking over
    lastAudioEnd = Date.now();
    try {
      audioEl.pause();
      if (audioEl.src && audioEl.src.startsWith('blob:')) URL.revokeObjectURL(audioEl.src);
      audioEl.removeAttribute('src');
      audioEl.load();
    } catch (e) {}
  }
  const SILENT_WAV = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
  let state = 'idle'; // idle | listening | thinking | speaking
  let fadeTimer = null;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  function setState(s, text) {
    state = s;
    earQuietUntil = Date.now() + 2000; // activity buys the conversation 2s of ear silence
    btn.classList.toggle('listening', s === 'listening');
    btn.classList.toggle('thinking', s === 'thinking');
    btn.classList.toggle('speaking', s === 'speaking');
    label.textContent = text || (wakeEnabled ? 'SAY “JARVIS”' : 'JARVIS');
    try { if (s !== 'idle') serverEarStop(); } catch (e) {} // free the mic BEFORE any playback
    // interaction finished — bring the movie/music back exactly as it was.
    // BUT: during a conversation window the TV stays paused, or its audio
    // would pour straight into the wake-word-free ear.
    if (s === 'idle' && duckedMedia && awaitingResume) {
      if (Date.now() < convoUntil) {
        clearTimeout(resumeHoldTimer);
        resumeHoldTimer = setTimeout(() => {
          if (state === 'idle' && !recording && duckedMedia && awaitingResume && Date.now() >= convoUntil) resumeMedia();
        }, convoUntil - Date.now() + 300);
      } else {
        resumeMedia();
      }
    }
  }

  // ---------- speaking pulse ----------
  // Simulated speech cadence — real Web Audio analysis of the reply poisoned
  // the iOS audio session and killed the mic on every tap after Jarvis spoke.
  const core = btn.querySelector('.core');
  let rafId = null;
  function pulseLoop() {
    if (state !== 'speaking') {
      core.style.transform = '';
      core.style.filter = '';
      return;
    }
    const t = Date.now() / 1000;
    const level = Math.max(0, 0.25 + 0.4 * Math.sin(t * 9) + 0.35 * Math.sin(t * 23 + 1.7));
    core.style.transform = 'scale(' + (1 + level * 0.4) + ')';
    core.style.filter = 'brightness(' + (1 + level * 0.9) + ')';
    rafId = requestAnimationFrame(pulseLoop);
  }

  // if Jarvis's reply ends in a question, open the mic for the answer
  function maybeFollowUp(text) {
    if (/\?\s*$/.test((text || '').trim())) {
      setTimeout(() => {
        if (state === 'idle' && !recording) recordCommand();
      }, 350);
    }
  }

  function showCaptions(you, jarvis) {
    clearTimeout(fadeTimer);
    captions.style.opacity = '1';
    if (you !== null) capYou.textContent = you;
    if (jarvis !== null) capJarvis.textContent = jarvis;
  }
  function fadeCaptionsSoon(ms) {
    clearTimeout(fadeTimer);
    fadeTimer = setTimeout(() => { captions.style.opacity = '0'; }, ms);
  }

  // ---------- movie library — LIVE from Jellyfin via the brain ----------
  // New files in the movies folder become voice-playable automatically.
  let LIB = { movies: [] };
  function loadLibrary() {
    fetch('/api/library').then(r => r.json()).then(j => {
      LIB = j;
      dbg('library: ' + (j.movies || []).length + (j.live ? ' (live)' : ' (cached)'));
    }).catch(() => {});
  }
  loadLibrary();
  setInterval(loadLibrary, 5 * 60 * 1000); // refresh every 5 minutes
  const launchBtn = document.getElementById('movie-launch');

  const norm = s => s.toLowerCase().replace(/[^a-z0-9 ]/g, ' ').replace(/\s+/g, ' ').trim();
  function lev(a, b) { // edit distance — forgives 'seven' vs 'se7en'
    const m = a.length, n = b.length;
    if (!m) return n; if (!n) return m;
    let prev = Array.from({ length: n + 1 }, (_, i) => i);
    for (let i = 1; i <= m; i++) {
      const cur = [i];
      for (let j = 1; j <= n; j++) {
        cur[j] = Math.min(prev[j] + 1, cur[j - 1] + 1, prev[j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1));
      }
      prev = cur;
    }
    return prev[n];
  }
  const DIGITWORDS = { 0:'zero',1:'one',2:'two',3:'three',4:'four',5:'five',6:'six',7:'seven',8:'eight',9:'nine',10:'ten',11:'eleven',12:'twelve' };
  function findMovie(text) {
    let t = norm(text);
    if (!t) return null;
    if (/^\d{1,2}$/.test(t) && DIGITWORDS[+t]) t = DIGITWORDS[+t]; // said "7" -> try "seven"
    let best = null, bestScore = 0;
    for (const m of (LIB.movies || [])) {
      const n = norm(m.name);
      let score = 0;
      if (t === n) score = 1;
      else if (t.includes(n) || n.includes(t)) score = 0.9;
      else {
        const d = lev(t, n);
        const s = 1 - d / Math.max(t.length, n.length);
        if (s >= 0.65) score = s * 0.85; // fuzzy — stylized titles & transcription slips
      }
      if (score > bestScore) { bestScore = score; best = m; }
    }
    return bestScore > 0 ? best : null;
  }
  function movieCommand(transcript) {
    const t = transcript.toLowerCase();
    if (/what movies|movie list|list (of )?movies|what do we have|what can we watch/.test(t)) return { type: 'list' };
    // the wall's eyes and morning voice
    if (/\b(look at this|what am i holding|what is this|what do you see|can you see this|check this out)\b/.test(t)) return { type: 'vision' };
    if (/\b(briefing|brief me|my morning report|what.?s my day)\b/.test(t)) return { type: 'briefing' };
    // routines — one phrase, many actions. Anchored to the START so questions
    // like "is tonight a good night for a movie" can't shut the room down.
    if (/^(?:ok(?:ay)? |alright |well |jarvis[,.]? )*(?:good ?night|(?:i'?m )?(?:going|off) to (?:bed|sleep)|bed ?time)\b/.test(t)) return { type: 'goodnight' };
    if (/^(?:ok(?:ay)? |alright |well |jarvis[,.]? )*good morning\b/.test(t)) return { type: 'goodmorning' };
    // desktop PC control
    if (/\b(turn on|wake|boot|start|power on) (my |the )?(pc|computer|desktop|rig)\b/.test(t)) return { type: 'pc', cmd: 'on', say: 'Waking your PC, sir.' };
    if (/\b(lock) (my |the )?(pc|computer|desktop|rig)\b/.test(t)) return { type: 'pc', cmd: 'pc_lock', say: 'Locking your PC, sir.' };
    if (/\b(sleep|put.*to sleep) (my |the )?(pc|computer|desktop|rig)\b/.test(t) || /\bput (my |the )?(pc|computer|desktop) to sleep\b/.test(t)) return { type: 'pc', cmd: 'pc_sleep', say: 'Sleeping your PC, sir.' };
    if (/\b(shut ?down|turn off|power off) (my |the )?(pc|computer|desktop|rig)\b/.test(t)) return { type: 'pc', cmd: 'pc_shutdown', say: 'Shutting down your PC, sir.' };
    if (/\b(restart|reboot) (my |the )?(pc|computer|desktop|rig)\b/.test(t)) return { type: 'pc', cmd: 'pc_restart', say: 'Restarting your PC, sir.' };
    const pcapp = t.match(/\b(?:launch|open|start|load|run|play|boot up|fire up|pull up|get on|open up) (.+?) on (?:my |the )?(?:pc|computer|desktop|rig)\b/);
    if (pcapp) { const a = pcapp[1].replace(/^(the |up )/, '').trim(); return { type: 'pc', cmd: 'pc_launch', app: a, say: 'Launching ' + a + ' on your PC, sir.' }; }
    // paint the wall — AI-generated backdrop
    const paint = t.match(/\b(?:paint|set|change|make) (?:the )?(?:wall|background|backdrop|screen)(?: to| into)?\s+(.+)$/);
    if (paint && paint[1]) return { type: 'paint', prompt: paint[1].replace(/[.!?]+$/, '').trim() };
    if (/\b(clear|remove|reset) (?:the )?(?:wall|background|backdrop|art)\b/.test(t)) return { type: 'paint', prompt: '' };
    // messages on the TV screen — check early so "tv" words don't trip other intents
    const msg = t.match(/\b(?:tell|message) the tv (?:that )?(.+)$/);
    if (msg) return { type: 'tvmsg', text: msg[1], say: 'On the screen, sir.' };
    // TV power on (Wake-on-LAN via the agent)
    if (/\bturn (?:the )?tv on\b|\bturn on (?:the )?tv\b|\bwake (?:up )?the tv\b/.test(t))
      return { type: 'tvon', say: 'Waking the television, sir.' };
    // timers & alarms — spoken numbers often arrive as WORDS ("one minute")
    const NUMWORDS = { a:1, an:1, one:1, two:2, three:3, four:4, five:5, six:6, seven:7,
      eight:8, nine:9, ten:10, eleven:11, twelve:12, fifteen:15, twenty:20,
      'twenty five':25, thirty:30, forty:40, 'forty five':45, fifty:50, sixty:60,
      seventy:70, eighty:80, ninety:90, hundred:100 };
    const num = w => /^\d+$/.test(w) ? parseInt(w, 10) : (NUMWORDS[w] || 0);
    const tm = t.match(/\btimer (?:for )?((?:\d+|[a-z]+(?: five)?))\s*(second|minute|hour)/);
    if (tm) {
      const n = num(tm[1]);
      if (n) {
        const mult = tm[2] === 'second' ? 1 : tm[2] === 'minute' ? 60 : 3600;
        return { type: 'timer', secs: n * mult, say: 'Timer set for ' + n + ' ' + tm[2] + (n === 1 ? '' : 's') + ', sir.' };
      }
    }
    if (/\b(?:cancel|clear) (?:the )?(?:timer|alarm)s?\b/.test(t)) return { type: 'timer_cancel', say: 'Cancelled, sir.' };
    const al = t.match(/\b(?:alarm|wake me(?: up)?) (?:for |at )?(\d{1,2}|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve)(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)?/);
    if (al) {
      const rawH = num(al[1]);
      if (!rawH) return null;
      let h = rawH % 12;
      const mer = (al[3] || '').replace(/\./g, '');
      if (mer === 'pm') h += 12;
      if (!mer && rawH >= 13) h = rawH; // 24h spoken
      const mm = al[2] || '00';
      const hm = String(h).padStart(2, '0') + ':' + mm;
      const disp = (h % 12 || 12) + ':' + mm + ' ' + (h >= 12 ? 'PM' : 'AM');
      return { type: 'alarm', hm, disp, say: 'Alarm set for ' + disp + ', sir.' };
    }
    // music transport — pause/skip/resume ABOUT music goes to the brain's
    // Spotify controls, never to the TV
    const aboutMusic = /\b(music|song|spotify|track|playlist)\b/.test(t);
    if (aboutMusic && /\b(pause|stop|resume|unpause|skip|next|previous|back|volume|louder|quieter|turn (it )?(up|down))\b/.test(t)) return { type: 'music' };
    // TV transport controls
    const aboutTv = /\b(tv|television|movie|film|big screen)\b/.test(t);
    if (/\bpause\b/.test(t) && aboutTv) return { type: 'tv', command: 'Pause' };
    if (/\b(resume|unpause|continue|keep (playing|going))\b/.test(t)) return { type: 'tv', command: 'Unpause' };
    if (/\bstop\b/.test(t) && aboutTv) return { type: 'tv', command: 'Stop' };
    // TV volume / power / apps (LG webOS via the home agent)
    const vs = t.match(/\bvolume\s+(?:to\s+|at\s+)?([\w-]+)\b/);
    if (vs) {
      const lvl = num(vs[1]);
      if (lvl > 0 && lvl <= 100) return { type: 'tvv', payload: { action: 'set', level: lvl }, say: 'Volume ' + lvl + ', sir.' };
    }
    if (/\bvolume up\b|\bturn it up\b|\blouder\b/.test(t)) return { type: 'tvv', payload: { action: 'up', steps: 3 }, say: 'Turning it up, sir.' };
    if (/\bvolume down\b|\bturn it down\b|\bquieter\b/.test(t)) return { type: 'tvv', payload: { action: 'down', steps: 3 }, say: 'Turning it down, sir.' };
    if (/\bunmute\b/.test(t)) return { type: 'tvv', payload: { action: 'unmute' }, say: 'Sound restored, sir.' };
    if (/\bmute\b/.test(t)) return { type: 'tvv', payload: { action: 'mute' }, say: 'Muted, sir.' };
    if (/\bturn (?:the )?tv off\b|\bturn off (?:the )?tv\b|\btv off\b/.test(t)) return { type: 'tvoff', say: 'Powering down the television, sir.' };
    const ap = t.match(/\bopen\s+(netflix|youtube|jellyfin|prime(?:\s*video)?|disney(?:\s*plus)?|hulu|spotify)\b/);
    if (ap) return { type: 'tvapp', app: ap[1], say: 'Opening ' + ap[1] + ' on the television, sir.' };
    // play <movie> [on the tv]
    // note: "open <app>" is caught by the app intent ABOVE this line, so
    // "open netflix" launches the app while "open fight club" plays the movie
    const m = t.match(/^(?:hey jarvis[,! ]*)?(?:can you |could you |please )?(?:play|watch|put on|start|open|load)\b(.*)$/i);
    if (m && m[1]) {
      const tvSuffix = /\s+on (?:the )?(?:tv|television|big screen)\s*[.!?]*\s*$/i;
      const onTv = tvSuffix.test(m[1]);
      const movie = findMovie(m[1].replace(tvSuffix, '').replace(/^(the movie|movie)\s+/i, ''));
      if (movie) return { type: onTv ? 'play_tv' : 'play', movie };
    }
    return null;
  }

  // hand a command to the home agent (the laptop) via the cloud queue
  async function sendToAgent(type, payload, confirmLine) {
    try {
      const res = await fetch('/api/agent/enqueue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type, payload })
      });
      if (!res.ok) throw new Error(res.status);
      speakText(confirmLine);
    } catch (e) {
      speakText('I could not reach the house systems, sir.');
    }
  }

  // speak a fixed line in Jarvis's voice (no brain round-trip)
  async function speakText(text) {
    const myGen = ++jarvisGen;
    const ac = new AbortController(); activeAbort = ac;
    setState('thinking', 'THINKING…');
    try {
      const res = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
        signal: ac.signal
      });
      if (!res.ok) throw new Error(res.status);
      const blob = await res.blob();
      if (myGen !== jarvisGen) return; // interrupted
      showCaptions(null, text);
      setState('speaking', 'SPEAKING…');
      audioEl.src = URL.createObjectURL(blob);
      audioEl.onended = () => { if (myGen !== jarvisGen) return; releaseAudio(); setState('idle'); cancelAnimationFrame(rafId); pulseLoop(); fadeCaptionsSoon(8000); };
      audioEl.onerror = () => { if (myGen !== jarvisGen) return; releaseAudio(); setState('idle'); cancelAnimationFrame(rafId); pulseLoop(); fadeCaptionsSoon(8000); };
      await audioEl.play();
      pulseLoop();
    } catch (e) {
      if (myGen !== jarvisGen || (e && e.name === 'AbortError')) return; // interrupted
      showCaptions(null, text); // no voice, still show it
      setState('idle');
      fadeCaptionsSoon(6000);
    }
  }

  function playMovie(movie) {
    const url = 'http://' + LIB.host + ':' + LIB.port + '/web/index.html#/details?id=' + movie.id
      + (LIB.serverId ? '&serverId=' + LIB.serverId : '');
    speakText('Playing ' + movie.name + ', sir.');
    const w = window.open(url, '_blank');
    if (!w) { // popup blocked — show a tap target instead
      launchBtn.textContent = '▶  ' + movie.name.toUpperCase();
      launchBtn.style.display = 'flex';
      launchBtn.onclick = () => { window.open(url, '_blank'); launchBtn.style.display = 'none'; };
      setTimeout(() => { launchBtn.style.display = 'none'; }, 60000);
    }
  }

  async function askJarvis(message) {
    const myGen = ++jarvisGen;
    const ac = new AbortController(); activeAbort = ac;
    setState('thinking', 'THINKING…');
    try {
      const res = await fetch('/api/chat-and-speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
        signal: ac.signal
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const replyHeader = res.headers.get('X-Jarvis-Text');
      const reply = replyHeader ? decodeURIComponent(replyHeader) : '';
      const blob = await res.blob();
      if (myGen !== jarvisGen) return; // interrupted — don't play over the new request
      showCaptions(null, reply);
      setState('speaking', 'SPEAKING…');
      audioEl.src = URL.createObjectURL(blob);
      audioEl.onended = () => { if (myGen !== jarvisGen) return; releaseAudio(); openConvoWindow(); setState('idle'); cancelAnimationFrame(rafId); pulseLoop(); fadeCaptionsSoon(6000); maybeFollowUp(reply); };
      audioEl.onerror = () => { if (myGen !== jarvisGen) return; releaseAudio(); setState('idle'); cancelAnimationFrame(rafId); pulseLoop(); fadeCaptionsSoon(6000); };
      await audioEl.play();
      pulseLoop();
    } catch (e) {
      if (myGen !== jarvisGen || (e && e.name === 'AbortError')) return; // interrupted
      showCaptions(null, 'Jarvis is unreachable right now.');
      setState('idle');
      fadeCaptionsSoon(4000);
    }
  }

  // Fresh recognizer per listen (iPadOS goes deaf when an instance is
  // reused), but the old one is fully NEUTERED first — handlers stripped,
  // aborted — so it can't haunt the UI like the original ghost listeners.
  // ---------- hands-free wake word ----------
  // ambient "Jarvis" ear — label tap toggles it, choice persists per device
  let wakeEnabled = localStorage.getItem('wall_ear') !== '0';
  let earQuietUntil = 0; // the ear stays out of the way during + shortly after ANY interaction
  let carryText = '';    // words a dying session had in its mouth — stitched into the next one
  let carryUntil = 0;

  // ---------- conversation mode ----------
  // after Jarvis answers, the ear accepts a reply WITHOUT the wake word for a
  // short window — command-barking becomes back-and-forth. Each reply reopens it.
  let convoUntil = 0;
  function openConvoWindow() {
    if (document.body.classList.contains('night')) return;
    if (!wakeEnabled) return; // hands-free off = taps only, no open windows
    convoUntil = Date.now() + 9000;
    dbg('convo: go ahead');
  }

  // ---------- duck media: pause TV/Spotify while you talk, resume after ----------
  let duckedMedia = null;   // what we paused ({tv, spotify}) — resume exactly that
  let awaitingResume = false;
  let resumeHoldTimer = null;
  async function duckMedia() {
    try {
      const r = await fetch('/api/media/duck', { method: 'POST' });
      duckedMedia = r.ok ? await r.json() : null;
      if (duckedMedia && (duckedMedia.tv || duckedMedia.spotify)) awaitingResume = true;
      else duckedMedia = null;
    } catch (e) { duckedMedia = null; }
  }
  function resumeMedia() {
    if (!duckedMedia) return;
    const d = duckedMedia; duckedMedia = null; awaitingResume = false;
    fetch('/api/media/unduck', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tv: !!d.tv, spotify: !!d.spotify }) }).catch(() => {});
  }
  function keepDuckedPaused() { duckedMedia = null; awaitingResume = false; } // user's own command controls media now
  let recActive = false;  // a recognition session is currently open
  let armedUntil = 0;     // said bare "Jarvis" — next utterance is the command

  const WALL_VERSION = 'v45';
  // noise suppression + echo cancellation help against background TV/music
  const MIC_CONSTRAINTS = { echoCancellation: true, noiseSuppression: true, autoGainControl: true };
  const PC_MAC = '58:11:22:4E:B8:BE'; // desktop PC — Wake-on-LAN target
  const USE_WEBKIT_EAR = false; // Apple's ambient ear is RETIRED — server ears only
  const dbgEl = document.getElementById('dbg');
  dbgEl.textContent = WALL_VERSION;
  function dbg(msg) {
    const t = new Date();
    dbgEl.textContent = WALL_VERSION + ' · ' + msg + ' · ' + String(t.getMinutes()).padStart(2, '0') + ':' + String(t.getSeconds()).padStart(2, '0');
  }
  // a healthy session reports audio within moments; no signal in 3s = it
  // opened DEAF (grabbed the mic mid-release) — kill it so a clean one opens.
  // Each deaf catch backs off LONGER before retrying (a hasty regrab lands
  // right back in the poisoned window); a healthy open resets the patience.
  let deafStreak = 0;
  let guardUntil = 0;
  function watchDeaf(r, mySess) {
    setTimeout(() => {
      if (sess === mySess && recActive && !r._audio) {
        deafStreak = Math.min(deafStreak + 1, 4);
        guardUntil = Date.now() + 2000 * deafStreak;
        dbg('ear deaf — retry in ' + (2 * deafStreak) + 's');
        killRec();
        recActive = false;
      }
    }, 3000);
  }

  let rec = null;
  function killRec() {
    if (!rec) return;
    clearTimeout(rec._settle); // a pending draft-settle must die with its session
    rec.onresult = rec.onerror = rec.onend = rec.onaudiostart = null;
    try { rec.abort(); } catch (e) {}
    rec = null;
  }
  async function handleTranscript(transcript) {
    showCaptions('“' + transcript + '”', '');
    let cmd = movieCommand(transcript);
    if (!cmd) cmd = await llmIntent(transcript); // AI router for any phrasing
    runCmd(cmd, transcript);
  }

  // when the quick patterns miss, a fast model maps the words to a command
  async function llmIntent(transcript) {
    try {
      setState('thinking', 'THINKING…');
      const res = await fetch('/api/intent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: transcript, movies: (LIB.movies || []).map(m => m.name) })
      });
      if (!res.ok) return null;
      const j = await res.json();
      dbg('intent: ' + (j.intent || 'none'));
      switch (j.intent) {
        case 'volume_set': {
          const lvl = Math.max(0, Math.min(100, parseInt(j.level, 10) || 0));
          return { type: 'tvv', payload: { action: 'set', level: lvl }, say: 'Volume ' + lvl + ', sir.' };
        }
        case 'volume_up': return { type: 'tvv', payload: { action: 'up', steps: 3 }, say: 'Turning it up, sir.' };
        case 'volume_down': return { type: 'tvv', payload: { action: 'down', steps: 3 }, say: 'Turning it down, sir.' };
        case 'mute': return { type: 'tvv', payload: { action: 'mute' }, say: 'Muted, sir.' };
        case 'unmute': return { type: 'tvv', payload: { action: 'unmute' }, say: 'Sound restored, sir.' };
        case 'tv_off': return { type: 'tvoff', say: 'Powering down the television, sir.' };
        case 'tv_on': return { type: 'tvon', say: 'Waking the television, sir.' };
        case 'open_app': return j.app ? { type: 'tvapp', app: j.app, say: 'Opening ' + j.app + ' on the television, sir.' } : null;
        case 'play_movie': {
          const movie = findMovie(j.title || '');
          return movie ? { type: j.on_tv ? 'play_tv' : 'play', movie } : null;
        }
        case 'pause': return { type: 'tv', command: 'Pause' };
        case 'resume': return { type: 'tv', command: 'Unpause' };
        case 'stop_playback': return { type: 'tv', command: 'Stop' };
        case 'timer': {
          const secs = parseInt(j.seconds, 10) || 0;
          if (secs <= 0) return null;
          const mins = Math.round(secs / 60);
          return { type: 'timer', secs, say: 'Timer set for ' + (secs < 90 ? secs + ' seconds' : mins + ' minutes') + ', sir.' };
        }
        case 'alarm': {
          const h = parseInt(j.hour, 10), mn = parseInt(j.minute, 10) || 0;
          if (isNaN(h)) return null;
          const hm = String(h).padStart(2, '0') + ':' + String(mn).padStart(2, '0');
          const disp = (h % 12 || 12) + ':' + String(mn).padStart(2, '0') + ' ' + (h >= 12 ? 'PM' : 'AM');
          return { type: 'alarm', hm, disp, say: 'Alarm set for ' + disp + ', sir.' };
        }
        case 'movie_list': return { type: 'list' };
        case 'tv_message': return j.text ? { type: 'tvmsg', text: j.text, say: 'On the screen, sir.' } : null;
        case 'play_music': return null; // falls through to the brain, whose Spotify tools do the playing
        case 'look': return { type: 'vision' };
        case 'briefing': return { type: 'briefing' };
        case 'goodnight': return { type: 'goodnight' };
        case 'good_morning': return { type: 'goodmorning' };
        case 'music_control': return { type: 'music' };
        case 'paint_wall': return { type: 'paint', prompt: (j.prompt || '').trim() };
        case 'pc': {
          const a = (j.action || '').toLowerCase();
          if (a === 'on') return { type: 'pc', cmd: 'on', say: 'Waking your PC, sir.' };
          if (a === 'lock') return { type: 'pc', cmd: 'pc_lock', say: 'Locking your PC, sir.' };
          if (a === 'sleep') return { type: 'pc', cmd: 'pc_sleep', say: 'Sleeping your PC, sir.' };
          if (a === 'shutdown') return { type: 'pc', cmd: 'pc_shutdown', say: 'Shutting down your PC, sir.' };
          if (a === 'restart') return { type: 'pc', cmd: 'pc_restart', say: 'Restarting your PC, sir.' };
          if (j.app) return { type: 'pc', cmd: 'pc_launch', app: String(j.app).trim(), say: 'Launching ' + j.app + ' on your PC, sir.' };
          return null;
        }
        default: return null;
      }
    } catch (e) { return null; }
  }

  function runCmd(cmd, transcript) {
    // any TV/movie/playback command means the user is steering media —
    // don't let auto-resume fight their intent
    if (cmd && ['play','play_tv','tv','tvv','tvapp','tvoff','tvon','pc'].includes(cmd.type)) keepDuckedPaused();
    if (cmd && cmd.type === 'play') {
      playMovie(cmd.movie);
    } else if (cmd && cmd.type === 'play_tv') {
      sendToAgent('play_on_tv', { itemId: cmd.movie.id, name: cmd.movie.name },
        'Playing ' + cmd.movie.name + ' on the television, sir.');
    } else if (cmd && cmd.type === 'tv') {
      sendToAgent('tv_command', { command: cmd.command },
        cmd.command === 'Pause' ? 'Pausing, sir.'
        : cmd.command === 'Unpause' ? 'Resuming playback.'
        : 'Stopping playback, sir.');
    } else if (cmd && cmd.type === 'tvv') {
      sendToAgent('tv_volume', cmd.payload, cmd.say);
    } else if (cmd && cmd.type === 'tvapp') {
      sendToAgent('tv_app', { app: cmd.app }, cmd.say);
    } else if (cmd && cmd.type === 'tvoff') {
      sendToAgent('tv_off', {}, cmd.say);
    } else if (cmd && cmd.type === 'tvon') {
      // the TV has two network interfaces — knock on both doors
      sendToAgent('tv_on', { mac: '54:b7:bd:b4:45:a4' }, cmd.say);
      fetch('/api/agent/enqueue', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'tv_on', payload: { mac: '64:e4:a5:94:20:2c' } }) }).catch(() => {});
    } else if (cmd && cmd.type === 'tvmsg') {
      sendToAgent('tv_notify', { text: cmd.text }, cmd.say);
    } else if (cmd && cmd.type === 'timer') {
      timerEnd = Date.now() + cmd.secs * 1000;
      localStorage.setItem('timer_end', String(timerEnd));
      speakText(cmd.say);
    } else if (cmd && cmd.type === 'alarm') {
      alarmAt = cmd.hm;
      alarmDisp = cmd.disp;
      localStorage.setItem('alarm_at', alarmAt);
      localStorage.setItem('alarm_disp', alarmDisp);
      speakText(cmd.say);
    } else if (cmd && cmd.type === 'timer_cancel') {
      timerEnd = 0; alarmAt = ''; alarmDisp = '';
      localStorage.removeItem('timer_end');
      localStorage.removeItem('alarm_at');
      localStorage.removeItem('alarm_disp');
      speakText(cmd.say);
    } else if (cmd && cmd.type === 'list') {
      const names = (LIB.movies || []).map(m => m.name);
      speakText(names.length
        ? 'We have ' + names.length + (names.length === 1 ? ' film: ' : ' films: ') + names.join(', ') + '.'
        : 'The library is empty, sir. A tragedy, frankly.');
    } else if (cmd && cmd.type === 'music') {
      keepDuckedPaused(); // a music command — don't auto-resume over it
      askJarvis(transcript); // brain's spotify_control does the pausing/skipping
    } else if (cmd && cmd.type === 'vision') {
      lookAtThis(transcript);
    } else if (cmd && cmd.type === 'pc') {
      if (cmd.cmd === 'on') {
        sendToAgent('wol', { mac: PC_MAC }, cmd.say); // power-on via the always-on agent
      } else {
        // control commands go to the desktop's own listener queue
        fetch('/api/pc/enqueue', { method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: cmd.cmd, payload: cmd.app ? { app: cmd.app } : {} }) })
          .then(r => { if (!r.ok) throw 0; speakText(cmd.say); })
          .catch(() => speakText('I could not reach your PC, sir.'));
      }
    } else if (cmd && cmd.type === 'paint') {
      paintWall(cmd.prompt);
    } else if (cmd && cmd.type === 'briefing') {
      playBriefing();
    } else if (cmd && cmd.type === 'goodnight') {
      doGoodnight();
    } else if (cmd && cmd.type === 'goodmorning') {
      doGoodMorning();
    } else {
      askJarvis(transcript);
    }
  }

  // ---------- routines: one phrase, many actions ----------
  function nextSevenAM() {
    const d = new Date();
    if (d.getHours() >= 7) d.setDate(d.getDate() + 1);
    d.setHours(7, 0, 0, 0);
    return d.getTime();
  }
  function doGoodnight() {
    // pause whatever's playing (Spotify direct, TV via the agent), TV off,
    // wall into night mode until morning — and none of it auto-resumes
    fetch('/api/media/duck', { method: 'POST' }).catch(() => {});
    keepDuckedPaused();
    fetch('/api/agent/enqueue', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'tv_off', payload: {} }) }).catch(() => {});
    nightOverrideUntil = nextSevenAM();
    localStorage.setItem('wall_night_until', String(nightOverrideUntil));
    wakeUntil = 0;
    speakText(alarmAt
      ? 'Goodnight, sir. Your ' + alarmDisp + ' alarm is set. Sleep well.'
      : 'Goodnight, sir. Sleep well.');
    setTimeout(() => { tick(); }, 4500); // let the goodnight land, then lights out
  }
  function doGoodMorning() {
    nightOverrideUntil = 0;
    localStorage.removeItem('wall_night_until');
    wakeUntil = Date.now() + 120000;
    tick();
    playBriefing('Good morning, sir.');
  }

  function makeRec(wake) {
    killRec();
    rec = new SR();
    rec.lang = 'en-US';
    // SHORT sessions only — continuous mode goes silently deaf on iPadOS
    // (audio flows, results never come). The watchdog chains short sessions
    // back-to-back, with release-window + deaf-backoff guards at the seams.
    rec.continuous = false;
    rec.interimResults = !!wake;

  // ---------- SERVER EARS: tap records real audio -> /api/transcribe ----------

  // ---------- the ambient ear: keeps a wake-word listener open when idle ----------

  // pre-roll (no clipped first words), sent to /api/transcribe, and only
  // acted on if it contains "Jarvis". Silence costs nothing.
  const SE_RATE = 16000, SE_RING_SECONDS = 25;

  async function serverEarStart() {

  function ringSlice(startPos, endPos) {
    const len = (endPos - startPos + seRing.length) % seRing.length;

  function wavBlob(pcm) {

  async function serverEarUtterance(startPos, endPos) {

  // ---------- PORCUPINE: on-device "Jarvis" wake word (Apple-free, instant) ----------

        { publicPath: '/static/porcupine/jarvis_wasm.ppn', label: 'Jarvis' },
        () => onWakeWord(),
        { publicPath: '/static/porcupine/porcupine_params.pv' }
      );
      pvWvp = WVP;
      await WVP.subscribe(pvWorker);
      porcupineOn = true;
      dbg('wake: Jarvis (on-device)');
    } catch (e) {
      dbg('wake: porcupine failed');
      porcupineOn = false; // supervisor will fall back to the server ear
    }
    pvStarting = false;
  }

  async function onWakeWord() {
    // "Jarvis" heard on-device → hand the mic to the command recorder
    if (!wakeEnabled || recording || state !== 'idle') return;
    if (document.body.classList.contains('night')) return;
    if (Date.now() < earQuietUntil) return;
    try { if (pvWvp && pvWorker) await pvWvp.unsubscribe(pvWorker); } catch (e) {}
    await recordCommand();                 // duck + record + server STT for the command
    try { if (porcupineOn && pvWvp && pvWorker) await pvWvp.subscribe(pvWorker); } catch (e) {}
  }

  if (wakeEnabled) setTimeout(startPorcupine, 1500);

  // ---------- EYES: on-demand vision ----------
  // The camera opens ONLY for the moment of a "look at this" — a standing
  // camera session breaks the iPad's audio (deaf recordings / muted TTS).
  let camStream = null, camReady = false;
  const camVideo = document.createElement('video');
  camVideo.setAttribute('playsinline', '');
  camVideo.muted = true;

  async function openEyes() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return false;
    try {
      camStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false
      });
      camVideo.srcObject = camStream;
      await camVideo.play();
      camReady = true;
      dbg('eyes open');
      return true;
    } catch (e) { dbg('eyes: ' + (e.name || 'blocked')); return false; }
  }
  function closeEyes() {
    camReady = false;
    if (camStream) { try { camStream.getTracks().forEach(t => t.stop()); } catch (e) {} }
    camStream = null;
    camVideo.srcObject = null;
    dbg('eyes closed');
  }

  function snapFrame() {
    if (!camReady) return null;
    const c = document.createElement('canvas');
    c.width = camVideo.videoWidth || 640;
    c.height = camVideo.videoHeight || 480;
    c.getContext('2d').drawImage(camVideo, 0, 0, c.width, c.height);
    return c.toDataURL('image/jpeg', 0.7);
  }

  async function lookAtThis(question) {
    setState('thinking', 'LOOKING…');
    const opened = await openEyes();
    if (opened) await new Promise(r => setTimeout(r, 800)); // let exposure settle
    const img = snapFrame();
    closeEyes(); // never leave the camera running — it wrecks the audio system
    if (!img) { speakText('My eyes are unavailable, sir — allow the camera and try again.'); return; }
    setState('thinking', 'LOOKING…');
    try {
      const res = await fetch('/api/vision', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: img, question: question || 'What am I holding or showing you? Answer briefly.' })
      });
      if (!res.ok) throw 0;
      const replyHeader = res.headers.get('X-Jarvis-Text');
      const visionReply = replyHeader ? decodeURIComponent(replyHeader) : '';
      showCaptions(null, visionReply);
      const blob = await res.blob();
      setState('speaking', 'SPEAKING…');
      audioEl.src = URL.createObjectURL(blob);
      audioEl.onended = () => { releaseAudio(); openConvoWindow(); setState('idle'); cancelAnimationFrame(rafId); pulseLoop(); fadeCaptionsSoon(10000); maybeFollowUp(visionReply); };
      audioEl.onerror = () => { releaseAudio(); setState('idle'); fadeCaptionsSoon(10000); };
      await audioEl.play();
      pulseLoop();
    } catch (e) {
      setState('idle');
      showCaptions(null, 'I couldn’t get a look, sir.');
      fadeCaptionsSoon(3000);
    }
  }

  // ---------- morning briefing ----------
  async function playBriefing(fallbackLine) {
    setState('thinking', 'BRIEFING…');
    try {
      const r = await fetch('/api/briefing');
      if (!r.ok) throw 0;
      const j = await r.json();
      const bytes = Uint8Array.from(atob(j.audio), c => c.charCodeAt(0));
      const blob = new Blob([bytes], { type: 'audio/mpeg' });
      showCaptions(null, j.text || '');
      setState('speaking', 'SPEAKING…');
      audioEl.src = URL.createObjectURL(blob);
      audioEl.onended = () => { releaseAudio(); setState('idle'); cancelAnimationFrame(rafId); pulseLoop(); fadeCaptionsSoon(12000); };
      audioEl.onerror = () => { releaseAudio(); setState('idle'); fadeCaptionsSoon(12000); };
      await audioEl.play();
      pulseLoop();
    } catch (e) {
      if (fallbackLine) speakText(fallbackLine);
      else { setState('idle'); showCaptions(null, 'Briefing unavailable, sir.'); fadeCaptionsSoon(3000); }
    }
  }

  // ---------- house intercom: the wall speaks what the family sends ----------
  setInterval(async () => {
    try {
      const r = await fetch('/api/announcements');
      if (!r.ok) return;
      const j = await r.json();
      const list = j.announcements || [];
      if (!list.length) return;
      const a = list[list.length - 1];
      wakeUntil = Date.now() + 120000; tick(); // announcements wake the wall
      showCaptions('📢 Announcement', a.text);
      if (state === 'idle' && !recording) speakText(a.text);
      else fadeCaptionsSoon(12000);
    } catch (e) {}
  }, 5000);

  // ---------- AI wall art (Jarvis paints the backdrop, Pollinations Flux) ----------
  const artEl = document.createElement('div');
  artEl.id = 'wallart';
  document.body.prepend(artEl);
  const ART_THEMES = [
    'a serene misty mountain range at dawn, minimalist, muted tones',
    'a calm moonlit ocean under a starry sky, deep blues',
    'a quiet snowy pine forest at dusk, soft and atmospheric',
    'northern lights over a still frozen lake, cinematic',
    'rolling green hills under soft morning fog, painterly',
    'a desert at golden hour, long shadows, warm minimal',
    'a cozy rainy city street at night, neon reflections, moody',
    'abstract flowing waves of deep blue and violet light',
  ];
  function artURL(prompt, seed) {
    const p = encodeURIComponent(prompt + ', wallpaper, dark, high detail');
    return 'https://image.pollinations.ai/prompt/' + p +
      '?model=flux&width=1280&height=800&nologo=true&seed=' + seed;
  }
  function paintWall(prompt) {
    if (!prompt) { // clear
      localStorage.removeItem('wall_art_prompt');
      localStorage.setItem('wall_art', '0');
      artEl.style.opacity = '0';
      speakText('Clearing the wall, sir.');
      return;
    }
    localStorage.setItem('wall_art_prompt', prompt);
    localStorage.setItem('wall_art', '1');
    speakText('Painting the wall, sir. One moment.');
    const seed = Math.floor((Date.now() / 1000) % 100000);
    const img = new Image();
    img.onload = () => { artEl.style.backgroundImage = 'url(' + img.src + ')'; artEl.style.opacity = '0.30'; };
    img.onerror = () => { showCaptions(null, 'The canvas failed me, sir.'); fadeCaptionsSoon(3000); };
    img.src = artURL(prompt, seed);
  }
  function applyArt() {
    if (localStorage.getItem('wall_art') !== '1') { artEl.style.opacity = '0'; return; }
    const custom = localStorage.getItem('wall_art_prompt');
    const d = new Date();
    const daySeed = d.getFullYear() * 1000 + (d.getMonth() + 1) * 40 + d.getDate();
    const prompt = custom || ART_THEMES[daySeed % ART_THEMES.length];
    const img = new Image();
    img.onload = () => { artEl.style.backgroundImage = 'url(' + img.src + ')'; artEl.style.opacity = '0.30'; };
    img.src = artURL(prompt, daySeed);
  }
  applyArt();
  setInterval(applyArt, 60 * 60 * 1000); // fresh scene daily, checked hourly
  document.getElementById('info').addEventListener('click', () => {
    const on = localStorage.getItem('wall_art') === '1';
    localStorage.setItem('wall_art', on ? '0' : '1');
    if (on) localStorage.removeItem('wall_art_prompt'); // toggling off clears custom too
    applyArt();
    showCaptions(null, on ? 'Art off, sir.' : 'Daily AI art on — or say “paint the wall …”.');
    fadeCaptionsSoon(2800);
  });

  // ---------- keep screen awake (backup to Auto-Lock: Never) ----------
  async function keepAwake() {
    try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch (e) {}
  }
  keepAwake();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') keepAwake();
  });
})();
</script>
</body>
</html>
